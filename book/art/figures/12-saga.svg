<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380"
     role="img" aria-label="Saga orchestration: the orchestrator runs Debit Wallet then Capture Payment; Capture Payment fails, so the saga compensates by running Refund Wallet, and the later Notify step is never reached"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="sg-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="sg-head-warn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0561d"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <marker id="sg-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="sg-comp" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#c2410c"/>
    </marker>
    <filter id="sg-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="788" height="368" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- forward rail label -->
  <text x="34" y="48" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">FORWARD</text>
  <path d="M104 42 L116 42 M112 39 L116 42 L112 45" fill="none" stroke="#2c8a1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- compensation rail label -->
  <path d="M150 332 L138 332 M142 329 L138 332 L142 335" fill="none" stroke="#c2410c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="156" y="336" fill="#c2410c" font-size="11" font-weight="700" letter-spacing="0.08em">COMPENSATION (UNDO)</text>

  <!-- ===== forward connectors (y=128) ===== -->
  <line x1="158" y1="128" x2="186" y2="128" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#sg-fwd)"/>
  <line x1="328" y1="128" x2="356" y2="128" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#sg-fwd)"/>
  <!-- not-reached connector to Notify (greyed dashed) -->
  <line x1="498" y1="128" x2="556" y2="128" stroke="#c7d2bc" stroke-width="2.2" stroke-dasharray="5,4"/>

  <!-- ===== Orchestrator (left) ===== -->
  <g filter="url(#sg-sh)">
    <rect x="38" y="90" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M38 101a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H38Z" fill="url(#sg-head)"/>
    <text x="98" y="107" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Orchestrator</text>
  </g>
  <text x="98" y="140" text-anchor="middle" fill="#33402e" font-size="10.5">saga engine</text>
  <text x="98" y="156" text-anchor="middle" fill="#7a8472" font-size="9.5">runs steps, rolls back</text>

  <!-- ===== Step 1: Debit Wallet ===== -->
  <g filter="url(#sg-sh)">
    <rect x="188" y="90" width="140" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M188 101a11 11 0 0 1 11-11h118a11 11 0 0 1 11 11v17H188Z" fill="url(#sg-head)"/>
    <text x="258" y="107" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Debit Wallet</text>
  </g>
  <text x="258" y="140" text-anchor="middle" fill="#33402e" font-size="10.5">reserve funds</text>
  <text x="258" y="156" text-anchor="middle" fill="#7a8472" font-size="9.5" font-family="ui-monospace,Menlo,monospace">compensate=refund</text>
  <circle cx="200" cy="102" r="11" fill="#1f5e16"/><text x="200" y="106" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- ===== Step 2: Capture Payment (FAILS) ===== -->
  <g filter="url(#sg-sh)">
    <rect x="358" y="90" width="140" height="78" rx="11" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
    <path d="M358 101a11 11 0 0 1 11-11h118a11 11 0 0 1 11 11v17H358Z" fill="url(#sg-head-warn)"/>
    <text x="428" y="107" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Capture Payment</text>
  </g>
  <text x="428" y="140" text-anchor="middle" fill="#33402e" font-size="10.5">payment gateway</text>
  <text x="428" y="156" text-anchor="middle" fill="#c2410c" font-size="9.5" font-weight="700">step fails</text>
  <circle cx="370" cy="102" r="11" fill="#1f5e16"/><text x="370" y="106" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <!-- failure marker: orange circle with vector X above the box top-right corner -->
  <circle cx="500" cy="74" r="13" fill="#ffffff" stroke="#c2410c" stroke-width="2"/>
  <path d="M495 69 L505 79 M505 69 L495 79" fill="none" stroke="#c2410c" stroke-width="2.4" stroke-linecap="round"/>

  <!-- ===== Step 3: Notify (not reached) ===== -->
  <rect x="558" y="90" width="120" height="78" rx="11" fill="#f4f7f0" stroke="#c7d2bc" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M558 101a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H558Z" fill="#c7d2bc"/>
  <text x="618" y="107" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Notify</text>
  <text x="618" y="140" text-anchor="middle" fill="#7a8472" font-size="10.5">send receipt</text>
  <text x="618" y="156" text-anchor="middle" fill="#7a8472" font-size="9.5">not reached</text>

  <!-- ===== Compensation path ===== -->
  <!-- failure at Capture Payment triggers compensation: drop down and run Refund Wallet (right-to-left) -->
  <path d="M428 168 L428 279 L332 279" fill="none" stroke="#c2410c" stroke-width="2.4" stroke-dasharray="6,4" marker-end="url(#sg-comp)"/>
  <!-- Refund Wallet -> Orchestrator (rollback reported back) -->
  <path d="M188 268 L168 268 L168 168" fill="none" stroke="#c2410c" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#sg-comp)"/>

  <!-- ===== Refund Wallet (compensation step) ===== -->
  <g filter="url(#sg-sh)">
    <rect x="188" y="240" width="140" height="78" rx="11" fill="#fff6f1" stroke="#c2410c" stroke-width="2"/>
    <path d="M188 251a11 11 0 0 1 11-11h118a11 11 0 0 1 11 11v17H188Z" fill="url(#sg-head-warn)"/>
    <text x="258" y="257" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Refund Wallet</text>
  </g>
  <text x="258" y="290" text-anchor="middle" fill="#33402e" font-size="10.5">release reserved funds</text>
  <text x="258" y="306" text-anchor="middle" fill="#7a8472" font-size="9.5">undo of step 1</text>

  <!-- comp label badge on the trigger drop path -->
  <rect x="382" y="197" width="92" height="22" rx="11" fill="#fff2e9" stroke="#c2410c" stroke-width="1.5"/>
  <text x="428" y="212" text-anchor="middle" fill="#c2410c" font-size="10.5" font-weight="600">compensate</text>

  <!-- amber accent spark -->
  <g transform="translate(742,52)">
    <path d="M0,-8 L1.8,-1.8 L8,0 L1.8,1.8 L0,8 L-1.8,1.8 L-8,0 L-1.8,-1.8 Z" fill="#ffc24b"/>
  </g>
</svg>
