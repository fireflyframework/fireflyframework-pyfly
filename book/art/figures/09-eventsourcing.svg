<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460"
     role="img" aria-label="Event sourcing: a TransferFunds command appends events to an append-only event store (WalletOpened, FundsDeposited, FundsWithdrawn); replaying the immutable stream rebuilds the Wallet aggregate state, an optional snapshot accelerates replay, and a projection builds a read model"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="es-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="es-head-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b7a9d"/>
      <stop offset="1" stop-color="#3f5b7a"/>
    </linearGradient>
    <marker id="es-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="es-read" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#5b7a9d"/>
    </marker>
    <marker id="es-amber" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#ffc24b"/>
    </marker>
    <filter id="es-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- outer card -->
  <rect x="6" y="6" width="788" height="448" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- ===================== row 1: command -> append ===================== -->
  <text x="34" y="48" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">WRITE</text>
  <path d="M84 43 L98 43 M93 39.5 L98 43 L93 46.5" fill="none" stroke="#2c8a1c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- node 1: TransferFunds command -->
  <g filter="url(#es-sh)">
    <rect x="34" y="62" width="148" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M34 73a11 11 0 0 1 11-11h126a11 11 0 0 1 11 11v17H34Z" fill="url(#es-head)"/>
    <text x="108" y="79" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">TransferFunds</text>
  </g>
  <text x="108" y="112" text-anchor="middle" fill="#33402e" font-size="10.5">command</text>
  <text x="108" y="128" text-anchor="middle" fill="#7a8472" font-size="9.5">applies new events</text>
  <circle cx="46" cy="74" r="11" fill="#1f5e16"/>
  <text x="46" y="78.5" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- command -> event store -->
  <line x1="184" y1="101" x2="218" y2="101" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#es-fwd)"/>
  <text x="201" y="92" text-anchor="middle" fill="#2c8a1c" font-size="9.5" font-weight="600" font-family="ui-monospace,Menlo,monospace">append</text>

  <!-- ===================== event store (append-only log) ===================== -->
  <g filter="url(#es-sh)">
    <rect x="224" y="46" width="416" height="110" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M224 57a11 11 0 0 1 11-11h394a11 11 0 0 1 11 11v17H224Z" fill="url(#es-head)"/>
    <text x="432" y="63" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">EventStore  -  append-only log</text>
  </g>
  <circle cx="236" cy="58" r="11" fill="#1f5e16"/>
  <text x="236" y="62.5" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- event chip 1: WalletOpened -->
  <rect x="240" y="90" width="120" height="50" rx="8" fill="#ffffff" stroke="#43b02a" stroke-width="1.6"/>
  <text x="300" y="109" text-anchor="middle" fill="#2c8a1c" font-size="10.5" font-weight="700">WalletOpened</text>
  <text x="300" y="125" text-anchor="middle" fill="#7a8472" font-size="9" font-family="ui-monospace,Menlo,monospace">seq 1 &#183; owner_id</text>

  <line x1="362" y1="115" x2="376" y2="115" stroke="#3a9e23" stroke-width="2" marker-end="url(#es-fwd)"/>

  <!-- event chip 2: FundsDeposited -->
  <rect x="378" y="90" width="124" height="50" rx="8" fill="#ffffff" stroke="#43b02a" stroke-width="1.6"/>
  <text x="440" y="109" text-anchor="middle" fill="#2c8a1c" font-size="10.5" font-weight="700">FundsDeposited</text>
  <text x="440" y="125" text-anchor="middle" fill="#7a8472" font-size="9" font-family="ui-monospace,Menlo,monospace">seq 2 &#183; amount</text>

  <line x1="504" y1="115" x2="518" y2="115" stroke="#3a9e23" stroke-width="2" marker-end="url(#es-fwd)"/>

  <!-- event chip 3: FundsWithdrawn -->
  <rect x="520" y="90" width="116" height="50" rx="8" fill="#ffffff" stroke="#43b02a" stroke-width="1.6"/>
  <text x="578" y="109" text-anchor="middle" fill="#2c8a1c" font-size="10.5" font-weight="700">FundsWithdrawn</text>
  <text x="578" y="125" text-anchor="middle" fill="#7a8472" font-size="9" font-family="ui-monospace,Menlo,monospace">seq 3 &#183; amount</text>

  <!-- immutable badge -->
  <rect x="650" y="62" width="116" height="28" rx="14" fill="#ffd86b" stroke="#ffc24b" stroke-width="1.5"/>
  <path d="M664 76 L669 81 L678 70" fill="none" stroke="#1f5e16" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="722" y="80" text-anchor="middle" fill="#1c2420" font-size="10" font-weight="700">immutable</text>

  <!-- ===================== row 2: replay -> rebuild state ===================== -->
  <!-- replay rail from event store down to replay row -->
  <path d="M432 156 L432 196 L300 196 L300 222" fill="none" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#es-fwd)"/>
  <text x="318" y="190" text-anchor="middle" fill="#2c8a1c" font-size="9.5" font-weight="600" font-family="ui-monospace,Menlo,monospace">replay()</text>

  <text x="34" y="232" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">REBUILD STATE</text>
  <circle cx="160" cy="227" r="11" fill="#1f5e16"/>
  <text x="160" y="231.5" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- fold caption -->
  <text x="300" y="255" text-anchor="middle" fill="#7a8472" font-size="9.5">fold the stream, event by event</text>

  <!-- replay chips -->
  <rect x="222" y="262" width="118" height="26" rx="6" fill="#ffffff" stroke="#43b02a" stroke-width="1.5"/>
  <text x="281" y="278" text-anchor="middle" fill="#2c8a1c" font-size="9.5" font-weight="600">WalletOpened</text>
  <line x1="342" y1="275" x2="356" y2="275" stroke="#3a9e23" stroke-width="1.8" marker-end="url(#es-fwd)"/>

  <rect x="358" y="262" width="120" height="26" rx="6" fill="#ffffff" stroke="#43b02a" stroke-width="1.5"/>
  <text x="418" y="278" text-anchor="middle" fill="#2c8a1c" font-size="9.5" font-weight="600">FundsDeposited</text>
  <line x1="480" y1="275" x2="494" y2="275" stroke="#3a9e23" stroke-width="1.8" marker-end="url(#es-fwd)"/>

  <rect x="496" y="262" width="118" height="26" rx="6" fill="#ffffff" stroke="#43b02a" stroke-width="1.5"/>
  <text x="555" y="278" text-anchor="middle" fill="#2c8a1c" font-size="9.5" font-weight="600">FundsWithdrawn</text>

  <!-- chips -> Wallet aggregate -->
  <line x1="616" y1="275" x2="644" y2="289" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#es-fwd)"/>

  <!-- Wallet aggregate -->
  <g filter="url(#es-sh)">
    <rect x="648" y="252" width="118" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M648 263a11 11 0 0 1 11-11h96a11 11 0 0 1 11 11v17H648Z" fill="url(#es-head)"/>
    <text x="707" y="269" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Wallet</text>
  </g>
  <text x="707" y="302" text-anchor="middle" fill="#33402e" font-size="10.5">rebuilt state</text>
  <text x="707" y="318" text-anchor="middle" fill="#7a8472" font-size="10" font-family="ui-monospace,Menlo,monospace">balance: 750</text>

  <!-- snapshot (optional) -->
  <rect x="222" y="306" width="200" height="36" rx="11" fill="#fff7e6" stroke="#ffc24b" stroke-width="1.6"/>
  <text x="240" y="321" fill="#1c2420" font-size="10" font-weight="700">snapshot every N events</text>
  <text x="240" y="335" fill="#7a8472" font-size="9">optional - skips early replay</text>
  <!-- snapshot fast-path arrow into Wallet -->
  <path d="M422 322 L520 322 L520 295 L644 295" fill="none" stroke="#ffc24b" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#es-amber)"/>

  <!-- ===================== divider ===================== -->
  <line x1="34" y1="362" x2="766" y2="362" stroke="#e7ece1" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ===================== row 3: projection -> read model ===================== -->
  <text x="34" y="394" fill="#3f5b7a" font-size="11" font-weight="700" letter-spacing="0.08em">READ</text>
  <path d="M70 389 L84 389 M79 385.5 L84 389 L79 392.5" fill="none" stroke="#3f5b7a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="389" r="11" fill="#1f5e16"/>
  <text x="160" y="393.5" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>

  <!-- event store -> projection (read path, dashed slate) -->
  <path d="M260 156 L260 410 L296 410" fill="none" stroke="#5b7a9d" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#es-read)"/>
  <text x="216" y="406" text-anchor="middle" fill="#3f5b7a" font-size="9.5" font-style="italic">fan-out</text>

  <!-- Projection node -->
  <g filter="url(#es-sh)">
    <rect x="298" y="384" width="150" height="56" rx="11" fill="#ffffff" stroke="#5b7a9d" stroke-width="2"/>
    <path d="M298 395a11 11 0 0 1 11-11h128a11 11 0 0 1 11 11v15H298Z" fill="url(#es-head-slate)"/>
    <text x="373" y="399" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Projection</text>
  </g>
  <text x="373" y="427" text-anchor="middle" fill="#33402e" font-size="10" font-family="ui-monospace,Menlo,monospace">on_event(e)</text>

  <!-- projection -> read model -->
  <line x1="450" y1="412" x2="486" y2="412" stroke="#5b7a9d" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#es-read)"/>

  <!-- read model node -->
  <g filter="url(#es-sh)">
    <rect x="488" y="384" width="150" height="56" rx="11" fill="#ffffff" stroke="#5b7a9d" stroke-width="2"/>
    <path d="M488 395a11 11 0 0 1 11-11h128a11 11 0 0 1 11 11v15H488Z" fill="url(#es-head-slate)"/>
    <text x="563" y="399" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Read model</text>
  </g>
  <text x="563" y="427" text-anchor="middle" fill="#7a8472" font-size="10">fast queries</text>
</svg>
