<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340"
     role="img" aria-label="Event Sourcing diagram: TransferFunds command appends events into append-only EventStore; replay arrow rebuilds Wallet aggregate state; snapshot every N events; Projection produces read model"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="700" height="340" fill="#eaf6df"/>

  <defs>
    <filter id="es-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="es-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="es-arrow-muted" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- ── Section labels ── -->
  <text x="20" y="22" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">① command</text>
  <text x="20" y="210" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">② replay → state</text>
  <text x="440" y="210" dominant-baseline="middle"
        fill="#8aa07e" font-size="11" font-weight="700">③ projection</text>

  <!-- ── TransferFunds command box ── -->
  <rect x="20" y="30" width="120" height="50" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#es-shadow)"/>
  <rect x="20" y="30" width="120" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="20" y="42" width="120" height="10" fill="#43b02a"/>
  <text x="80" y="41" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">TransferFunds</text>
  <text x="80" y="67" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">Command</text>

  <!-- Command → EventStore arrow -->
  <line x1="140" y1="55" x2="220" y2="55"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#es-arrow-green)"/>
  <text x="180" y="46" text-anchor="middle" fill="#43b02a" font-size="9" font-weight="600">append</text>

  <!-- ── EventStore: append-only log (stacked cards) ── -->
  <text x="350" y="22" text-anchor="middle" fill="#43b02a" font-size="11" font-weight="700">EventStore (append-only / immutable)</text>

  <!-- Card 1: WalletOpened -->
  <rect x="222" y="30" width="110" height="34" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#es-shadow)"/>
  <rect x="222" y="30" width="110" height="15" rx="6" ry="6" fill="#43b02a"/>
  <rect x="222" y="37" width="110" height="8" fill="#43b02a"/>
  <text x="277" y="37" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9.5" font-weight="700">WalletOpened</text>
  <text x="277" y="55" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8">seq 1 · owner_id</text>

  <!-- Card 2: FundsDeposited -->
  <rect x="340" y="30" width="110" height="34" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#es-shadow)"/>
  <rect x="340" y="30" width="110" height="15" rx="6" ry="6" fill="#43b02a"/>
  <rect x="340" y="37" width="110" height="8" fill="#43b02a"/>
  <text x="395" y="37" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9.5" font-weight="700">FundsDeposited</text>
  <text x="395" y="55" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8">seq 2 · amount</text>

  <!-- Card 3: FundsWithdrawn -->
  <rect x="458" y="30" width="110" height="34" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#es-shadow)"/>
  <rect x="458" y="30" width="110" height="15" rx="6" ry="6" fill="#43b02a"/>
  <rect x="458" y="37" width="110" height="8" fill="#43b02a"/>
  <text x="513" y="37" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9.5" font-weight="700">FundsWithdrawn</text>
  <text x="513" y="55" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8">seq 3 · amount</text>

  <!-- Immutability badge -->
  <rect x="578" y="32" width="100" height="28" rx="12" ry="12"
        fill="#ffc24b" stroke="#e89c00" stroke-width="1.5"/>
  <text x="628" y="46" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9" font-weight="700">immutable ✓</text>

  <!-- ── Separator line ── -->
  <line x1="10" y1="90" x2="690" y2="90" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ── Replay section ── -->
  <!-- replay arrow label -->
  <text x="180" y="112" text-anchor="middle" fill="#43b02a" font-size="11" font-weight="700">replay all events</text>

  <!-- Events mini-chips for replay row -->
  <rect x="22" y="120" width="80" height="24" rx="5" ry="5"
        fill="#ffffff" stroke="#43b02a" stroke-width="1.5"/>
  <text x="62" y="132" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="8.5" font-weight="600">WalletOpened</text>

  <line x1="102" y1="132" x2="118" y2="132"
        stroke="#43b02a" stroke-width="1.8"
        marker-end="url(#es-arrow-green)"/>

  <rect x="120" y="120" width="80" height="24" rx="5" ry="5"
        fill="#ffffff" stroke="#43b02a" stroke-width="1.5"/>
  <text x="160" y="132" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="8.5" font-weight="600">FundsDeposited</text>

  <line x1="200" y1="132" x2="216" y2="132"
        stroke="#43b02a" stroke-width="1.8"
        marker-end="url(#es-arrow-green)"/>

  <rect x="218" y="120" width="80" height="24" rx="5" ry="5"
        fill="#ffffff" stroke="#43b02a" stroke-width="1.5"/>
  <text x="258" y="132" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="8.5" font-weight="600">FundsWithdrawn</text>

  <!-- replay → aggregate -->
  <line x1="298" y1="132" x2="356" y2="155"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#es-arrow-green)"/>

  <!-- ── Wallet aggregate current state ── -->
  <rect x="358" y="145" width="120" height="56" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#es-shadow)"/>
  <rect x="358" y="145" width="120" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="358" y="157" width="120" height="12" fill="#43b02a"/>
  <text x="418" y="157" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Wallet</text>
  <text x="418" y="185" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="10">balance: £750</text>

  <!-- ── Snapshot tag (side note) ── -->
  <line x1="448" y1="90" x2="448" y2="148"
        stroke="#ffc24b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="448" y="94" width="78" height="22" rx="10" ry="10"
        fill="#ffc24b" stroke="#e89c00" stroke-width="1.5"/>
  <text x="487" y="105" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9" font-weight="700">snapshot @N</text>

  <!-- ── Separator line ── -->
  <line x1="10" y1="218" x2="690" y2="218" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ── Projection → read model (bottom) ── -->
  <!-- EventStore → Projection arrow -->
  <polyline points="350,64 350,232 500,232"
            fill="none" stroke="#8aa07e" stroke-width="2"
            marker-end="url(#es-arrow-muted)"/>
  <text x="380" y="225" fill="#6a7a64" font-size="9" font-style="italic">fan-out</text>

  <!-- Projection box -->
  <rect x="502" y="218" width="110" height="48" rx="10" ry="10"
        fill="#eaf6df" stroke="#8aa07e" stroke-width="2" filter="url(#es-shadow)"/>
  <rect x="502" y="218" width="110" height="22" rx="10" ry="10" fill="#8aa07e"/>
  <rect x="502" y="230" width="110" height="10" fill="#8aa07e"/>
  <text x="557" y="229" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">Projection</text>
  <text x="557" y="253" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">on_event(e)</text>

  <!-- Projection → read model -->
  <line x1="612" y1="242" x2="652" y2="242"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#es-arrow-muted)"/>

  <!-- read model box -->
  <rect x="654" y="218" width="36" height="48" rx="8" ry="8"
        fill="#f0f8ea" stroke="#8aa07e" stroke-width="2"/>
  <text x="672" y="242" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8.5" font-weight="700">read&#10;model</text>

</svg>
