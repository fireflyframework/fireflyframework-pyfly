<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220"
     role="img" aria-label="Resilience chain figure: request passes through Rate limiter, Bulkhead, Timeout, Circuit breaker gate chips left to right reaching Service; Fallback box below catches failures via red dashed arrow"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="220" fill="#eaf6df"/>

  <defs>
    <filter id="res-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="res-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="res-arrow-red" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d9534f"/>
    </marker>
    <marker id="res-arrow-muted" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- ── Request entry (left) ── -->
  <text x="18" y="88" dominant-baseline="middle"
        fill="#23402a" font-size="11" font-weight="700">Request</text>
  <line x1="18" y1="100" x2="50" y2="100"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#res-arrow-green)"/>

  <!-- helper macro: shield gate chip is a rounded rect with a small shield icon -->
  <!-- Gate 1: Rate limiter -->
  <rect x="52" y="76" width="96" height="48" rx="16" ry="16"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#res-shadow)"/>
  <!-- shield icon inside -->
  <path d="M78 90 C78 90 72 93 72 100 C72 107 77 111 78 112 C79 111 84 107 84 100 C84 93 78 90 78 90 Z"
        fill="#43b02a" opacity="0.3"/>
  <text x="100" y="94" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">Rate</text>
  <text x="100" y="108" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">limiter</text>

  <!-- Gate 1 → Gate 2 -->
  <line x1="148" y1="100" x2="162" y2="100"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#res-arrow-green)"/>

  <!-- Gate 2: Bulkhead -->
  <rect x="164" y="76" width="96" height="48" rx="16" ry="16"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#res-shadow)"/>
  <path d="M190 90 C190 90 184 93 184 100 C184 107 189 111 190 112 C191 111 196 107 196 100 C196 93 190 90 190 90 Z"
        fill="#43b02a" opacity="0.3"/>
  <text x="212" y="94" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">Bulk-</text>
  <text x="212" y="108" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">head</text>

  <!-- Gate 2 → Gate 3 -->
  <line x1="260" y1="100" x2="274" y2="100"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#res-arrow-green)"/>

  <!-- Gate 3: Timeout -->
  <rect x="276" y="76" width="96" height="48" rx="16" ry="16"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#res-shadow)"/>
  <path d="M302 90 C302 90 296 93 296 100 C296 107 301 111 302 112 C303 111 308 107 308 100 C308 93 302 90 302 90 Z"
        fill="#43b02a" opacity="0.3"/>
  <text x="324" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">Timeout</text>

  <!-- Gate 3 → Gate 4 -->
  <line x1="372" y1="100" x2="386" y2="100"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#res-arrow-green)"/>

  <!-- Gate 4: Circuit breaker -->
  <rect x="388" y="76" width="108" height="48" rx="16" ry="16"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#res-shadow)"/>
  <path d="M414 90 C414 90 408 93 408 100 C408 107 413 111 414 112 C415 111 420 107 420 100 C420 93 414 90 414 90 Z"
        fill="#43b02a" opacity="0.3"/>
  <text x="444" y="94" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">Circuit</text>
  <text x="444" y="108" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="700">breaker</text>

  <!-- Gate 4 → Service -->
  <line x1="496" y1="100" x2="532" y2="100"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#res-arrow-green)"/>

  <!-- ── Service box (right) ── -->
  <rect x="534" y="72" width="120" height="56" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#res-shadow)"/>
  <rect x="534" y="72" width="120" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="534" y="84" width="120" height="12" fill="#43b02a"/>
  <text x="594" y="84" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Service</text>
  <text x="594" y="112" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">business logic</text>

  <!-- Failure path: gates → Fallback (red dashed down) -->
  <!-- From circuit breaker down to fallback -->
  <line x1="442" y1="124" x2="442" y2="168"
        stroke="#d9534f" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="442" y1="168" x2="536" y2="168"
        stroke="#d9534f" stroke-width="2" stroke-dasharray="5,4"
        marker-end="url(#res-arrow-red)"/>

  <!-- Failure label -->
  <text x="442" y="148" text-anchor="middle"
        fill="#d9534f" font-size="8.5" font-style="italic" transform="rotate(-90 442 148)">open / rejected</text>

  <!-- ── Fallback box ── -->
  <rect x="538" y="156" width="130" height="50" rx="10" ry="10"
        fill="#fff5f5" stroke="#d9534f" stroke-width="2" filter="url(#res-shadow)"/>
  <rect x="538" y="156" width="130" height="22" rx="10" ry="10" fill="#d9534f"/>
  <rect x="538" y="168" width="130" height="10" fill="#d9534f"/>
  <text x="603" y="167" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">Fallback</text>
  <text x="603" y="192" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">default / cached resp.</text>

  <!-- Amber sparkle top-right -->
  <g transform="translate(686, 38)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

  <!-- Label: happy path -->
  <text x="282" y="56" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="700">resilience chain</text>

</svg>
