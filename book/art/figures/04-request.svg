<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300"
     role="img" aria-label="HTTP request lifecycle: a request flows through the Client, Filter chain, Controller, Service and Repository, then a 200/JSON response returns to the Client"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="rq-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <marker id="rq-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="rq-bwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#5b7a9d"/>
    </marker>
    <filter id="rq-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="748" height="288" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- forward flow rail label -->
  <text x="34" y="50" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">REQUEST</text>
  <path d="M92 44 L104 44 M100 41 L104 44 L100 47" fill="none" stroke="#2c8a1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- return rail label -->
  <path d="M46 248 L34 248 M38 245 L34 248 L38 251" fill="none" stroke="#5b7a9d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="52" y="252" fill="#5b7a9d" font-size="11" font-weight="700" letter-spacing="0.08em">RESPONSE</text>

  <!-- ===== nodes: 5 across; x = 40,180,320,460,600 ; w=120 h=78 y=96 ===== -->
  <!-- forward arrows between nodes (y=135) -->
  <line x1="162" y1="135" x2="178" y2="135" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#rq-fwd)"/>
  <line x1="302" y1="135" x2="318" y2="135" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#rq-fwd)"/>
  <line x1="442" y1="135" x2="458" y2="135" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#rq-fwd)"/>
  <line x1="582" y1="135" x2="598" y2="135" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#rq-fwd)"/>

  <!-- node 1 Client -->
  <g filter="url(#rq-sh)">
    <rect x="40" y="96" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M40 107a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H40Z" fill="url(#rq-head)"/>
    <text x="100" y="113" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Client</text>
  </g>
  <text x="100" y="146" text-anchor="middle" fill="#33402e" font-size="10.5">browser / curl</text>
  <text x="100" y="162" text-anchor="middle" fill="#7a8472" font-size="9.5">sends the request</text>
  <circle cx="52" cy="108" r="11" fill="#1f5e16"/><text x="52" y="112" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- node 2 Filter chain -->
  <g filter="url(#rq-sh)">
    <rect x="180" y="96" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M180 107a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H180Z" fill="url(#rq-head)"/>
    <text x="240" y="113" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Filter chain</text>
  </g>
  <text x="240" y="146" text-anchor="middle" fill="#33402e" font-size="10.5">auth &#183; logging</text>
  <text x="240" y="162" text-anchor="middle" fill="#7a8472" font-size="9.5">rate-limit, CORS</text>
  <circle cx="192" cy="108" r="11" fill="#1f5e16"/><text x="192" y="112" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- node 3 Controller -->
  <g filter="url(#rq-sh)">
    <rect x="320" y="96" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M320 107a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H320Z" fill="url(#rq-head)"/>
    <text x="380" y="113" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Controller</text>
  </g>
  <text x="380" y="146" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">@get_mapping</text>
  <text x="380" y="162" text-anchor="middle" fill="#7a8472" font-size="9.5">route handler</text>
  <circle cx="332" cy="108" r="11" fill="#1f5e16"/><text x="332" y="112" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- node 4 Service -->
  <g filter="url(#rq-sh)">
    <rect x="460" y="96" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M460 107a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H460Z" fill="url(#rq-head)"/>
    <text x="520" y="113" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Service</text>
  </g>
  <text x="520" y="146" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">@service</text>
  <text x="520" y="162" text-anchor="middle" fill="#7a8472" font-size="9.5">business logic</text>
  <circle cx="472" cy="108" r="11" fill="#1f5e16"/><text x="472" y="112" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>

  <!-- node 5 Repository -->
  <g filter="url(#rq-sh)">
    <rect x="600" y="96" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M600 107a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H600Z" fill="url(#rq-head)"/>
    <text x="660" y="113" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Repository</text>
  </g>
  <text x="660" y="146" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">@repository</text>
  <text x="660" y="162" text-anchor="middle" fill="#7a8472" font-size="9.5">data access</text>
  <circle cx="612" cy="108" r="11" fill="#1f5e16"/><text x="612" y="112" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>

  <!-- return path: from repo bottom back along y=212 to client, dashed -->
  <path d="M660 174 L660 212 L100 212 L100 174" fill="none" stroke="#5b7a9d" stroke-width="2"
        stroke-dasharray="5,4" marker-end="url(#rq-bwd)"/>
  <rect x="342" y="201" width="76" height="22" rx="11" fill="#eef3f8" stroke="#5b7a9d" stroke-width="1.5"/>
  <text x="380" y="216" text-anchor="middle" fill="#3f5b7a" font-size="10.5" font-weight="600">200 / JSON</text>
</svg>
