<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340"
     role="img" aria-label="Event-driven architecture: EventPublisher publishes a FundsDeposited event to the InMemoryEventBus, which fans out to three independent listeners - BalanceProjection, Notifier, and AuditLog. The publisher has no knowledge of the listeners."
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="eda-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <marker id="eda-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <filter id="eda-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="768" height="328" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- rail label -->
  <text x="34" y="46" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">PUBLISH</text>
  <path d="M104 40 L116 40 M112 37 L116 40 L112 43" fill="none" stroke="#2c8a1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="124" y="46" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">FAN-OUT</text>

  <!-- ===== forward arrows ===== -->
  <!-- publisher -> bus (y=170) -->
  <line x1="186" y1="170" x2="244" y2="170" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#eda-fwd)"/>
  <!-- bus -> BalanceProjection (top) -->
  <path d="M404 154 L444 154 L444 90 L496 90" fill="none" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#eda-fwd)"/>
  <!-- bus -> Notifier (middle) -->
  <line x1="404" y1="170" x2="496" y2="170" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#eda-fwd)"/>
  <!-- bus -> AuditLog (bottom) -->
  <path d="M404 186 L444 186 L444 250 L496 250" fill="none" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#eda-fwd)"/>

  <!-- ===== node 1: EventPublisher ===== -->
  <g filter="url(#eda-sh)">
    <rect x="44" y="132" width="142" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M44 143a11 11 0 0 1 11-11h120a11 11 0 0 1 11 11v17H44Z" fill="url(#eda-head)"/>
    <text x="115" y="149" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">EventPublisher</text>
  </g>
  <text x="115" y="182" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">publish(event)</text>
  <text x="115" y="198" text-anchor="middle" fill="#7a8472" font-size="9.5">aggregate raises a fact</text>
  <circle cx="56" cy="144" r="11" fill="#1f5e16"/><text x="56" y="148" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- ===== node 2: InMemoryEventBus ===== -->
  <g filter="url(#eda-sh)">
    <rect x="246" y="132" width="158" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M246 143a11 11 0 0 1 11-11h136a11 11 0 0 1 11 11v17H246Z" fill="url(#eda-head)"/>
    <text x="325" y="149" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">InMemoryEventBus</text>
  </g>
  <text x="325" y="182" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">dispatch()</text>
  <text x="325" y="198" text-anchor="middle" fill="#7a8472" font-size="9.5">routes to listeners</text>
  <circle cx="258" cy="144" r="11" fill="#1f5e16"/><text x="258" y="148" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- amber event badge above the bus -->
  <g transform="translate(325,86)">
    <path d="M0 -13 L3.5 -4 L13 -4 L5.5 2 L8 11 L0 5.5 L-8 11 L-5.5 2 L-13 -4 L-3.5 -4 Z"
          fill="#ffc24b" stroke="#1f5e16" stroke-width="0.6"/>
  </g>
  <rect x="263" y="100" width="124" height="20" rx="10" fill="#ffd86b" stroke="#1f5e16" stroke-width="1"/>
  <text x="325" y="114" text-anchor="middle" fill="#1c2420" font-size="10" font-weight="700" font-family="ui-monospace,Menlo,monospace">FundsDeposited</text>
  <!-- connector from event badge down to bus header -->
  <line x1="325" y1="120" x2="325" y2="132" stroke="#ffc24b" stroke-width="2"/>

  <!-- ===== node 3: BalanceProjection (top) ===== -->
  <g filter="url(#eda-sh)">
    <rect x="498" y="58" width="240" height="64" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M498 69a11 11 0 0 1 11-11h218a11 11 0 0 1 11 11v17H498Z" fill="url(#eda-head)"/>
    <text x="618" y="75" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">BalanceProjection</text>
  </g>
  <text x="618" y="106" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">on_funds_deposited()</text>
  <circle cx="510" cy="70" r="11" fill="#1f5e16"/><text x="510" y="74" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- ===== node 4: Notifier (middle) ===== -->
  <g filter="url(#eda-sh)">
    <rect x="498" y="138" width="240" height="64" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M498 149a11 11 0 0 1 11-11h218a11 11 0 0 1 11 11v17H498Z" fill="url(#eda-head)"/>
    <text x="618" y="155" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Notifier</text>
  </g>
  <text x="618" y="186" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">send_email()</text>
  <circle cx="510" cy="150" r="11" fill="#1f5e16"/><text x="510" y="154" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- ===== node 5: AuditLog (bottom) ===== -->
  <g filter="url(#eda-sh)">
    <rect x="498" y="218" width="240" height="64" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M498 229a11 11 0 0 1 11-11h218a11 11 0 0 1 11 11v17H498Z" fill="url(#eda-head)"/>
    <text x="618" y="235" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">AuditLog</text>
  </g>
  <text x="618" y="266" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">append_entry()</text>
  <circle cx="510" cy="230" r="11" fill="#1f5e16"/><text x="510" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- decoupling note -->
  <rect x="44" y="288" width="410" height="30" rx="11" fill="#eef3f8" stroke="#5b7a9d" stroke-width="1.5"/>
  <text x="64" y="307" fill="#3f5b7a" font-size="10.5"><tspan font-weight="700">Zero coupling:</tspan><tspan font-weight="400"> the publisher never names a listener - add one, no edits.</tspan></text>
</svg>
