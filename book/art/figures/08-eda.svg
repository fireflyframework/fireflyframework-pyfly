<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280"
     role="img" aria-label="EDA diagram: EventPublisher sends to InMemoryEventBus which fans out to BalanceProjection, Notifier, and AuditLog listeners. Publisher does not know the listeners."
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="680" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="eda-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="eda-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="eda-arrow-pub" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- ── EventPublisher (left) ── -->
  <rect x="30" y="110" width="128" height="56" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#eda-shadow)"/>
  <rect x="30" y="110" width="128" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="30" y="122" width="128" height="12" fill="#43b02a"/>
  <text x="94" y="122" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">EventPublisher</text>
  <text x="94" y="150" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">publish(event)</text>

  <!-- Publisher → Bus arrow -->
  <line x1="158" y1="138" x2="248" y2="138"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#eda-arrow-pub)"/>

  <!-- Decoupling note above arrow -->
  <text x="203" y="127" text-anchor="middle"
        fill="#6a7a64" font-size="9" font-style="italic">no listener knowledge</text>

  <!-- ── InMemoryEventBus (center) ── -->
  <rect x="250" y="104" width="136" height="68" rx="14" ry="14"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#eda-shadow)"/>
  <rect x="250" y="104" width="136" height="26" rx="14" ry="14" fill="#43b02a"/>
  <rect x="250" y="118" width="136" height="12" fill="#43b02a"/>
  <text x="318" y="117" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">InMemoryEventBus</text>
  <text x="318" y="148" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">dispatch → listeners</text>

  <!-- Amber event star on bus -->
  <g transform="translate(318, 82)">
    <path d="M0,-12 L3,-3 L12,0 L3,3 L0,12 L-3,3 L-12,0 L-3,-3 Z" fill="#ffc24b"/>
  </g>
  <text x="318" y="64" text-anchor="middle" fill="#23402a" font-size="9" font-weight="600">FundsDeposited</text>

  <!-- Bus → BalanceProjection (top) -->
  <polyline points="386,120 440,68 472,68"
            fill="none" stroke="#8aa07e" stroke-width="2"
            marker-end="url(#eda-arrow)"/>

  <!-- Bus → Notifier (middle) -->
  <line x1="386" y1="138" x2="472" y2="138"
        fill="none" stroke="#8aa07e" stroke-width="2"
        marker-end="url(#eda-arrow)"/>

  <!-- Bus → AuditLog (bottom) -->
  <polyline points="386,156 440,208 472,208"
            fill="none" stroke="#8aa07e" stroke-width="2"
            marker-end="url(#eda-arrow)"/>

  <!-- ── BalanceProjection (top right) ── -->
  <rect x="474" y="46" width="148" height="44" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#eda-shadow)"/>
  <rect x="474" y="46" width="148" height="20" rx="10" ry="10" fill="#43b02a"/>
  <rect x="474" y="56" width="148" height="10" fill="#43b02a"/>
  <text x="548" y="56" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">BalanceProjection</text>
  <text x="548" y="80" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">on_funds_deposited()</text>

  <!-- ── Notifier (middle right) ── -->
  <rect x="474" y="116" width="148" height="44" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#eda-shadow)"/>
  <rect x="474" y="116" width="148" height="20" rx="10" ry="10" fill="#43b02a"/>
  <rect x="474" y="126" width="148" height="10" fill="#43b02a"/>
  <text x="548" y="126" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">Notifier</text>
  <text x="548" y="150" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">send_email()</text>

  <!-- ── AuditLog (bottom right) ── -->
  <rect x="474" y="186" width="148" height="44" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#eda-shadow)"/>
  <rect x="474" y="186" width="148" height="20" rx="10" ry="10" fill="#43b02a"/>
  <rect x="474" y="196" width="148" height="10" fill="#43b02a"/>
  <text x="548" y="196" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">AuditLog</text>
  <text x="548" y="220" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">append_entry()</text>

  <!-- Decoupling label bottom -->
  <text x="203" y="238" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="600" font-style="italic">publisher ↔ listeners: zero coupling</text>

</svg>
