<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260"
     role="img" aria-label="Many scattered tools converge into PyFly, one cohesive stack"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="640" height="260" fill="#eaf6df"/>

  <!-- ── LEFT: Chaotic scattered tool labels ── -->

  <!-- FastAPI — tilted right -->
  <g transform="translate(50, 62) rotate(6)">
    <rect x="-44" y="-16" width="88" height="32" rx="16" ry="16"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#6a7a64" font-size="13">FastAPI</text>
  </g>

  <!-- Flask — overlapping, tilted left -->
  <g transform="translate(130, 40) rotate(-9)">
    <rect x="-32" y="-15" width="64" height="30" rx="15" ry="15"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#6a7a64" font-size="13">Flask</text>
  </g>

  <!-- SQLAlchemy — large pill, tilted -->
  <g transform="translate(90, 108) rotate(4)">
    <rect x="-60" y="-16" width="120" height="32" rx="16" ry="16"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#6a7a64" font-size="13">SQLAlchemy</text>
  </g>

  <!-- aiokafka — tilted left, overlapping -->
  <g transform="translate(60, 154) rotate(-7)">
    <rect x="-44" y="-16" width="88" height="32" rx="16" ry="16"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#6a7a64" font-size="13">aiokafka</text>
  </g>

  <!-- Redis — small pill, tilted right -->
  <g transform="translate(148, 178) rotate(10)">
    <rect x="-30" y="-15" width="60" height="30" rx="15" ry="15"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#6a7a64" font-size="13">Redis</text>
  </g>

  <!-- dependency-injector — wide pill, tilted left -->
  <g transform="translate(105, 215) rotate(-5)">
    <rect x="-74" y="-16" width="148" height="32" rx="16" ry="16"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#6a7a64" font-size="12">dependency-injector</text>
  </g>

  <!-- ── CENTER: Arrow ── -->
  <defs>
    <marker id="choice-arrowhead" markerWidth="12" markerHeight="8"
            refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#43b02a"/>
    </marker>
  </defs>
  <line x1="280" y1="130" x2="368" y2="130"
        stroke="#43b02a" stroke-width="5"
        marker-end="url(#choice-arrowhead)"/>

  <!-- ── RIGHT: Single tidy PyFly box ── -->
  <defs>
    <filter id="choice-shadow" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#2c8a1c" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect x="390" y="80" width="210" height="100" rx="18" ry="18"
        fill="#43b02a" filter="url(#choice-shadow)"/>

  <!-- PyFly label -->
  <text x="495" y="120" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="28" font-weight="700" letter-spacing="0.5">PyFly</text>

  <!-- subtitle -->
  <text x="495" y="148" text-anchor="middle" dominant-baseline="middle"
        fill="#b8f090" font-size="13">one cohesive stack</text>

</svg>
