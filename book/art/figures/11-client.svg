<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 332"
     role="img" aria-label="Typed HTTP client: WalletService calls the PaymentsClient typed proxy declared with at-service-client; HttpClientBeanPostProcessor generates the implementation, which calls the external Payments service over HTTP with circuit breaker and retry resilience"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cl-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <marker id="cl-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="cl-bwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#5b7a9d"/>
    </marker>
    <filter id="cl-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="768" height="320" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- section label -->
  <text x="34" y="44" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.06em">TYPED CLIENT - NO HAND-ROLLED HTTP</text>

  <!-- amber accent sparkle, top-right -->
  <g transform="translate(726,40)">
    <path d="M0,-8 L1.8,-1.8 L8,0 L1.8,1.8 L0,8 L-1.8,1.8 L-8,0 L-1.8,-1.8 Z" fill="#ffc24b"/>
  </g>

  <!-- ===== nodes: y=104 h=84 ; centres x: WalletService 124, PaymentsClient 360, Payments 656 ===== -->

  <!-- forward arrow: WalletService -> PaymentsClient -->
  <line x1="216" y1="146" x2="240" y2="146" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#cl-fwd)"/>

  <!-- forward arrow: PaymentsClient -> Payments (the HTTP wire) -->
  <line x1="480" y1="146" x2="588" y2="146" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#cl-fwd)"/>
  <text x="534" y="138" text-anchor="middle" fill="#7a8472" font-size="9.5" font-style="italic">HTTP</text>

  <!-- node 1: WalletService -->
  <g filter="url(#cl-sh)">
    <rect x="32" y="104" width="184" height="84" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M32 115a11 11 0 0 1 11-11h162a11 11 0 0 1 11 11v17H32Z" fill="url(#cl-head)"/>
    <text x="124" y="121" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">WalletService</text>
  </g>
  <text x="124" y="154" text-anchor="middle" fill="#33402e" font-size="10.5">caller / BFF</text>
  <text x="124" y="170" text-anchor="middle" fill="#7a8472" font-size="9.5">injects the client</text>
  <circle cx="48" cy="116" r="11" fill="#1f5e16"/><text x="48" y="120" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- node 2: PaymentsClient typed proxy -->
  <!-- @service_client badge above the box -->
  <rect x="282" y="76" width="156" height="22" rx="11" fill="#1f5e16"/>
  <text x="360" y="91" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700" font-family="ui-monospace,Menlo,monospace">@service_client</text>
  <g filter="url(#cl-sh)">
    <rect x="240" y="104" width="240" height="84" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M240 115a11 11 0 0 1 11-11h218a11 11 0 0 1 11 11v17H240Z" fill="url(#cl-head)"/>
    <text x="360" y="121" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">PaymentsClient</text>
  </g>
  <text x="360" y="153" text-anchor="middle" fill="#33402e" font-size="10.5">typed interface proxy</text>
  <text x="360" y="170" text-anchor="middle" fill="#7a8472" font-size="9.5" font-style="italic">no hand-rolled httpx</text>
  <circle cx="256" cy="116" r="11" fill="#1f5e16"/><text x="256" y="120" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- node 3: Payments service (external) -->
  <g filter="url(#cl-sh)">
    <rect x="588" y="104" width="160" height="84" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M588 115a11 11 0 0 1 11-11h138a11 11 0 0 1 11 11v17H588Z" fill="url(#cl-head)"/>
    <text x="668" y="121" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Payments</text>
  </g>
  <text x="668" y="154" text-anchor="middle" fill="#33402e" font-size="10.5">external service</text>
  <text x="668" y="170" text-anchor="middle" fill="#7a8472" font-size="9.5">over the network</text>
  <circle cx="604" cy="116" r="11" fill="#1f5e16"/><text x="604" y="120" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- resilience badges on the wire -->
  <rect x="468" y="200" width="100" height="22" rx="11" fill="#eef3f8" stroke="#5b7a9d" stroke-width="1.5"/>
  <text x="518" y="215" text-anchor="middle" fill="#3f5b7a" font-size="9.5" font-weight="600">circuit breaker</text>
  <rect x="578" y="200" width="64" height="22" rx="11" fill="#eef3f8" stroke="#5b7a9d" stroke-width="1.5"/>
  <text x="610" y="215" text-anchor="middle" fill="#3f5b7a" font-size="9.5" font-weight="600">retry x3</text>
  <!-- dashed connector from the HTTP wire down to the resilience badges -->
  <path d="M534 158 L534 188 L518 188 L518 198" fill="none" stroke="#5b7a9d" stroke-width="1.6" stroke-dasharray="4,3"/>

  <!-- ===== generation note: BeanPostProcessor writes the implementation ===== -->
  <!-- upward generation arrow into the PaymentsClient proxy -->
  <line x1="360" y1="268" x2="360" y2="192" stroke="#3a9e23" stroke-width="2.4" stroke-dasharray="6,4" marker-end="url(#cl-fwd)"/>
  <rect x="170" y="270" width="380" height="34" rx="11" fill="#f3f8ee" stroke="#3a9e23" stroke-width="1.5"/>
  <text x="360" y="284" text-anchor="middle" fill="#1c2420" font-size="10.5" font-weight="700">HttpClientBeanPostProcessor</text>
  <text x="360" y="298" text-anchor="middle" fill="#7a8472" font-size="9.5">generates the implementation at startup</text>
</svg>
