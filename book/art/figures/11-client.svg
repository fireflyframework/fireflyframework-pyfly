<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240"
     role="img" aria-label="HTTP client figure: WalletService calls PaymentsClient typed proxy (at-service-client annotation) over HTTP to Payments service with circuit-breaker and retry badges on the wire"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="700" height="240" fill="#eaf6df"/>

  <defs>
    <filter id="client-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="client-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="client-arrow-muted" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- ── WalletService (left) ── -->
  <rect x="28" y="88" width="128" height="60" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#client-shadow)"/>
  <rect x="28" y="88" width="128" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="28" y="100" width="128" height="12" fill="#43b02a"/>
  <text x="92" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">WalletService</text>
  <text x="92" y="130" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">calls client</text>

  <!-- Arrow: WalletService → PaymentsClient proxy -->
  <line x1="156" y1="118" x2="210" y2="118"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#client-arrow-green)"/>

  <!-- ── PaymentsClient proxy chip (center-left) ── -->
  <!-- @service_client badge above proxy box -->
  <rect x="212" y="70" width="136" height="20" rx="10" ry="10"
        fill="#43b02a"/>
  <text x="280" y="80" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9.5" font-weight="700">@service_client</text>

  <rect x="212" y="88" width="136" height="60" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#client-shadow)"/>
  <rect x="212" y="88" width="136" height="24" rx="12" ry="12" fill="#5fd13a"/>
  <rect x="212" y="100" width="136" height="12" fill="#5fd13a"/>
  <text x="280" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="700">PaymentsClient</text>
  <text x="280" y="128" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">typed interface proxy</text>
  <!-- "not hand-rolled" note -->
  <text x="280" y="166" text-anchor="middle"
        fill="#6a7a64" font-size="8.5" font-style="italic">(not hand-rolled httpx)</text>

  <!-- Arrow: PaymentsClient → wire with badges → Payments -->
  <line x1="348" y1="118" x2="434" y2="118"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#client-arrow-muted)"/>

  <!-- Wire label: HTTP -->
  <text x="391" y="108" text-anchor="middle"
        fill="#6a7a64" font-size="9" font-style="italic">HTTP</text>

  <!-- circuit breaker badge on wire -->
  <rect x="350" y="126" width="84" height="17" rx="8" ry="8"
        fill="#eaf6df" stroke="#8aa07e" stroke-width="1.5"/>
  <text x="392" y="134" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8.5" font-weight="600">circuit breaker</text>

  <!-- retry badge below that -->
  <rect x="370" y="147" width="44" height="17" rx="8" ry="8"
        fill="#eaf6df" stroke="#8aa07e" stroke-width="1.5"/>
  <text x="392" y="155" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8.5" font-weight="600">retry</text>

  <!-- ── Payments service (right) ── -->
  <rect x="436" y="88" width="128" height="60" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#client-shadow)"/>
  <rect x="436" y="88" width="128" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="436" y="100" width="128" height="12" fill="#43b02a"/>
  <text x="500" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Payments</text>
  <text x="500" y="130" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">service</text>

  <!-- Amber sparkle top-right -->
  <g transform="translate(660, 50)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

  <!-- Section label -->
  <text x="28" y="30" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">typed client — no hand-rolled HTTP</text>

</svg>
