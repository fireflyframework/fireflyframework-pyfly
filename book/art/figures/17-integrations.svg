<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260"
     role="img" aria-label="Integrations figure: @scheduled clock triggers a Job; a Notifier sends to email, SMS, and push; inbound Webhook verifies and dispatches; outbound Callback uses HMAC and retry"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="700" height="260" fill="#eaf6df"/>

  <defs>
    <filter id="int-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="int-arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="int-arr-g" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="int-arr-b" markerWidth="10" markerHeight="7"
            refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- Section label -->
  <text x="28" y="24" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">integrations — schedule · notify · webhook · callback</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- LEFT HALF: Scheduling + Notifications                              -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- ── Clock (@scheduled) ── -->
  <circle cx="76" cy="90" r="36" fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#int-shadow)"/>
  <circle cx="76" cy="90" r="4" fill="#43b02a"/>
  <line x1="76" y1="90" x2="76" y2="66" stroke="#2c8a1c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="90" x2="96" y2="90" stroke="#2c8a1c" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tick marks -->
  <line x1="76" y1="56" x2="76" y2="62" stroke="#43b02a" stroke-width="2"/>
  <line x1="76" y1="118" x2="76" y2="124" stroke="#43b02a" stroke-width="2"/>
  <line x1="42" y1="90" x2="48" y2="90" stroke="#43b02a" stroke-width="2"/>
  <line x1="104" y1="90" x2="110" y2="90" stroke="#43b02a" stroke-width="2"/>

  <text x="76" y="140" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="10" font-weight="700">@scheduled</text>

  <!-- Arrow clock → Job -->
  <line x1="112" y1="90" x2="146" y2="90"
        stroke="#8aa07e" stroke-width="2" marker-end="url(#int-arr)"/>

  <!-- Job box -->
  <rect x="148" y="68" width="80" height="44" rx="8" ry="8"
        fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#int-shadow)"/>
  <rect x="148" y="68" width="80" height="18" rx="8" ry="8" fill="#43b02a"/>
  <rect x="148" y="78" width="80" height="8" fill="#43b02a"/>
  <text x="188" y="77" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="10" font-weight="700">Job</text>
  <text x="188" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">cron / interval</text>

  <!-- Divider between schedule and notify sections -->
  <line x1="28" y1="156" x2="320" y2="156" stroke="#b8d9a0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── Notifier ── -->
  <!-- Envelope -->
  <rect x="46" y="176" width="56" height="40" rx="6" ry="6"
        fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#int-shadow)"/>
  <polyline points="46,176 74,196 102,176" fill="none" stroke="#43b02a" stroke-width="1.8"/>
  <text x="74" y="232" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="10" font-weight="700">Notifier</text>

  <!-- Notifier → channels -->
  <line x1="102" y1="196" x2="136" y2="183"
        stroke="#8aa07e" stroke-width="1.5" marker-end="url(#int-arr)"/>
  <line x1="102" y1="196" x2="136" y2="196"
        stroke="#8aa07e" stroke-width="1.5" marker-end="url(#int-arr)"/>
  <line x1="102" y1="196" x2="136" y2="210"
        stroke="#8aa07e" stroke-width="1.5" marker-end="url(#int-arr)"/>

  <!-- Channel chips -->
  <rect x="138" y="174" width="52" height="18" rx="6" ry="6"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.2"/>
  <text x="164" y="183" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9" font-weight="600">email</text>
  <rect x="138" y="187" width="52" height="18" rx="6" ry="6"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.2"/>
  <text x="164" y="196" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9" font-weight="600">SMS</text>
  <rect x="138" y="200" width="52" height="18" rx="6" ry="6"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.2"/>
  <text x="164" y="209" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9" font-weight="600">push</text>

  <!-- ═══════════════════════════════════════════════════════════════════ -->
  <!-- RIGHT HALF: Webhook + Callback                                     -->
  <!-- ═══════════════════════════════════════════════════════════════════ -->

  <!-- Vertical divider -->
  <line x1="332" y1="40" x2="332" y2="250" stroke="#b8d9a0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ── Inbound Webhook ── -->
  <rect x="350" y="48" width="150" height="72" rx="10" ry="10"
        fill="#fff" stroke="#5fd13a" stroke-width="2.5" filter="url(#int-shadow)"/>
  <rect x="350" y="48" width="150" height="24" rx="10" ry="10" fill="#5fd13a"/>
  <rect x="350" y="60" width="150" height="12" fill="#5fd13a"/>
  <text x="425" y="60" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="700">Webhook ↓ inbound</text>
  <text x="425" y="90" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">HMAC-SHA256 verify</text>
  <text x="425" y="106" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">dispatch to handler</text>

  <!-- Inbound arrow from 3rd party (right) -->
  <line x1="568" y1="84" x2="500" y2="84"
        stroke="#8aa07e" stroke-width="2" marker-end="url(#int-arr)"/>
  <text x="537" y="74" text-anchor="middle"
        fill="#6a7a64" font-size="8.5" font-style="italic">POST /webhook</text>

  <!-- ── Outbound Callback ── -->
  <rect x="350" y="156" width="150" height="72" rx="10" ry="10"
        fill="#fff" stroke="#2c8a1c" stroke-width="2.5" filter="url(#int-shadow)"/>
  <rect x="350" y="156" width="150" height="24" rx="10" ry="10" fill="#2c8a1c"/>
  <rect x="350" y="168" width="150" height="12" fill="#2c8a1c"/>
  <text x="425" y="168" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Callback ↑ outbound</text>
  <text x="425" y="198" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">HMAC-SHA256 sign</text>
  <text x="425" y="214" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">exponential retry</text>

  <!-- Outbound arrow to 3rd party -->
  <line x1="500" y1="192" x2="562" y2="192"
        stroke="#8aa07e" stroke-width="2" marker-end="url(#int-arr)"/>
  <text x="534" y="182" text-anchor="middle"
        fill="#6a7a64" font-size="8.5" font-style="italic">POST callback</text>

  <!-- 3rd party box -->
  <rect x="566" y="68" width="106" height="140" rx="10" ry="10"
        fill="#fff" stroke="#8aa07e" stroke-width="1.8" filter="url(#int-shadow)"/>
  <rect x="566" y="68" width="106" height="22" rx="10" ry="10" fill="#8aa07e"/>
  <rect x="566" y="80" width="106" height="10" fill="#8aa07e"/>
  <text x="619" y="79" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="10" font-weight="700">3rd party</text>
  <text x="619" y="138" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">external service</text>

  <!-- Amber sparkle -->
  <g transform="translate(666, 36)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>