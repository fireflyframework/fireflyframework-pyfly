<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Messaging diagram: Wallet service writes to outbox table, outbox relay publishes to broker topic wallet-events, Payments consumer subscribes; failed messages route to DLQ"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="msg-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="msg-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="msg-arrow-muted" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="msg-arrow-red" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8334a"/>
    </marker>
  </defs>

  <!-- Happy path label -->
  <text x="14" y="26" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">happy path</text>
  <!-- Failure path label -->
  <text x="14" y="208" dominant-baseline="middle"
        fill="#e8334a" font-size="11" font-weight="700">on failure</text>

  <!-- Lane separator -->
  <line x1="0" y1="190" x2="720" y2="190" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ── Wallet service (left) ── -->
  <rect x="24" y="86" width="100" height="52" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#msg-shadow)"/>
  <rect x="24" y="86" width="100" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="24" y="98" width="100" height="12" fill="#43b02a"/>
  <text x="74" y="98" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Wallet</text>
  <text x="74" y="125" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">service</text>

  <!-- Wallet → outbox arrow -->
  <line x1="124" y1="112" x2="172" y2="112"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#msg-arrow-green)"/>
  <text x="148" y="103" text-anchor="middle" fill="#43b02a" font-size="9" font-weight="600">write</text>

  <!-- ── Outbox table ── -->
  <rect x="174" y="88" width="94" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#msg-shadow)"/>
  <rect x="174" y="88" width="94" height="20" rx="10" ry="10" fill="#43b02a"/>
  <rect x="174" y="98" width="94" height="10" fill="#43b02a"/>
  <text x="221" y="98" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="10.5" font-weight="700">outbox</text>
  <text x="221" y="123" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">DB table</text>

  <!-- outbox → relay arrow -->
  <line x1="268" y1="112" x2="316" y2="112"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#msg-arrow-green)"/>
  <text x="292" y="103" text-anchor="middle" fill="#43b02a" font-size="9" font-weight="600">poll</text>

  <!-- ── Broker topic pill (center, Kafka-ish cylinder) ── -->
  <!-- Cylinder body -->
  <rect x="318" y="92" width="120" height="40" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#msg-shadow)"/>
  <!-- Top ellipse (cylinder cap) -->
  <ellipse cx="378" cy="92" rx="60" ry="10"
        fill="#43b02a" stroke="#2f7d1c" stroke-width="1.8"/>
  <!-- Bottom ellipse (cylinder bottom) -->
  <ellipse cx="378" cy="132" rx="60" ry="10"
        fill="#5fd13a" stroke="#2f7d1c" stroke-width="1.8"/>
  <!-- Cylinder sides fill -->
  <rect x="318" y="92" width="120" height="40" fill="#5fd13a"/>
  <!-- Top highlight -->
  <ellipse cx="360" cy="89" rx="20" ry="5" fill="#a0e070" opacity="0.5"/>
  <!-- Topic label -->
  <text x="378" y="112" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">wallet-events</text>

  <!-- Envelope icon above topic -->
  <rect x="366" y="70" width="22" height="16" rx="2" ry="2"
        fill="#fff" stroke="#43b02a" stroke-width="1.5"/>
  <polyline points="366,70 377,79 388,70"
            fill="none" stroke="#43b02a" stroke-width="1.4"/>

  <!-- Amber event star -->
  <g transform="translate(450, 78)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

  <!-- topic → Payments consumer arrow -->
  <line x1="438" y1="112" x2="496" y2="112"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#msg-arrow-green)"/>
  <text x="467" y="103" text-anchor="middle" fill="#43b02a" font-size="9" font-weight="600">consume</text>

  <!-- ── Payments consumer (right) ── -->
  <rect x="498" y="86" width="110" height="52" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#msg-shadow)"/>
  <rect x="498" y="86" width="110" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="498" y="98" width="110" height="12" fill="#43b02a"/>
  <text x="553" y="98" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Payments</text>
  <text x="553" y="125" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">consumer</text>

  <!-- ── Failure branch: topic → DLQ ── -->
  <!-- Dashed vertical from topic to failure lane -->
  <line x1="378" y1="142" x2="378" y2="210"
        stroke="#e8334a" stroke-width="1.8" stroke-dasharray="5,4"/>
  <!-- failure label -->
  <text x="388" y="182" fill="#e8334a" font-size="9" font-style="italic">max retries exceeded</text>

  <!-- Arrow to DLQ -->
  <line x1="378" y1="210" x2="408" y2="230"
        stroke="#e8334a" stroke-width="2"
        marker-end="url(#msg-arrow-red)"/>

  <!-- ── DLQ box ── -->
  <rect x="410" y="218" width="110" height="44" rx="10" ry="10"
        fill="#fff5f5" stroke="#e8334a" stroke-width="2" filter="url(#msg-shadow)"/>
  <rect x="410" y="218" width="110" height="20" rx="10" ry="10" fill="#e8334a"/>
  <rect x="410" y="228" width="110" height="10" fill="#e8334a"/>
  <text x="465" y="228" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">DLQ</text>
  <text x="465" y="250" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">dead-letter queue</text>

</svg>
