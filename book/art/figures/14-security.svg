<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240"
     role="img" aria-label="Security figure: HTTP request passes through JWT auth filter and @secure RBAC check before reaching the Service; an IDP box feeds the JWT filter with tokens"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="700" height="240" fill="#eaf6df"/>

  <defs>
    <filter id="sec-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="sec-arr-muted" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="sec-arr-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="sec-arr-amber" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffc24b"/>
    </marker>
  </defs>

  <!-- Section label -->
  <text x="28" y="28" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">security filter chain — JWT auth + RBAC</text>

  <!-- ── Request ── -->
  <rect x="28" y="86" width="90" height="56" rx="10" ry="10"
        fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#sec-shadow)"/>
  <rect x="28" y="86" width="90" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="28" y="98" width="90" height="10" fill="#43b02a"/>
  <text x="73" y="97" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">Request</text>
  <text x="73" y="126" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">Bearer token</text>

  <!-- Arrow → JWT Filter -->
  <line x1="118" y1="114" x2="154" y2="114"
        stroke="#8aa07e" stroke-width="2" marker-end="url(#sec-arr-muted)"/>

  <!-- ── JWT Auth filter ── -->
  <!-- Shield shape using path -->
  <path d="M195 56 Q195 50 188 50 Q180 50 180 56 L180 62 Q180 70 188 74 Q196 70 196 62 Z"
        fill="#43b02a" opacity="0.2"/>
  <path d="M188 52 L193 56 L193 63 Q193 68 188 71 Q183 68 183 63 L183 56 Z"
        fill="#43b02a" opacity="0.7"/>

  <rect x="156" y="86" width="100" height="56" rx="10" ry="10"
        fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#sec-shadow)"/>
  <rect x="156" y="86" width="100" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="156" y="98" width="100" height="10" fill="#43b02a"/>
  <text x="206" y="97" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">JWT auth</text>
  <text x="206" y="120" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">verify signature</text>
  <text x="206" y="132" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">decode claims</text>

  <!-- Arrow → @secure -->
  <line x1="256" y1="114" x2="294" y2="114"
        stroke="#8aa07e" stroke-width="2" marker-end="url(#sec-arr-muted)"/>
  <text x="275" y="106" text-anchor="middle"
        fill="#6a7a64" font-size="8.5" font-style="italic">principal</text>

  <!-- ── @secure check ── -->
  <rect x="296" y="86" width="100" height="56" rx="10" ry="10"
        fill="#fff" stroke="#2c8a1c" stroke-width="2.5" filter="url(#sec-shadow)"/>
  <rect x="296" y="86" width="100" height="22" rx="10" ry="10" fill="#2c8a1c"/>
  <rect x="296" y="98" width="100" height="10" fill="#2c8a1c"/>
  <text x="346" y="97" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">@secure</text>
  <text x="346" y="120" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">role check</text>
  <text x="346" y="132" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">expression eval</text>

  <!-- Arrow → Service -->
  <line x1="396" y1="114" x2="432" y2="114"
        stroke="#43b02a" stroke-width="2" marker-end="url(#sec-arr-green)"/>
  <text x="414" y="106" text-anchor="middle"
        fill="#6a7a64" font-size="8.5" font-style="italic">allowed</text>

  <!-- ── Service ── -->
  <rect x="434" y="86" width="100" height="56" rx="10" ry="10"
        fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#sec-shadow)"/>
  <rect x="434" y="86" width="100" height="22" rx="10" ry="10" fill="#5fd13a"/>
  <rect x="434" y="98" width="100" height="10" fill="#5fd13a"/>
  <text x="484" y="97" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="11" font-weight="700">Service</text>
  <text x="484" y="126" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">business logic</text>

  <!-- ── IDP box (below JWT filter) ── -->
  <rect x="156" y="176" width="100" height="48" rx="10" ry="10"
        fill="#fff" stroke="#ffc24b" stroke-width="2.5" filter="url(#sec-shadow)"/>
  <rect x="156" y="176" width="100" height="22" rx="10" ry="10" fill="#ffc24b"/>
  <rect x="156" y="188" width="100" height="10" fill="#ffc24b"/>
  <text x="206" y="187" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="11" font-weight="700">IDP</text>
  <text x="206" y="212" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">token issuer / OIDC</text>

  <!-- Dashed arrow IDP → JWT filter -->
  <line x1="206" y1="176" x2="206" y2="142"
        stroke="#ffc24b" stroke-width="1.8" stroke-dasharray="5,3"
        marker-end="url(#sec-arr-amber)"/>
  <text x="218" y="162" fill="#6a7a64" font-size="8.5" font-style="italic">issues JWT</text>

  <!-- Rejected path (dashed red line from @secure down) -->
  <line x1="346" y1="142" x2="346" y2="170"
        stroke="#d9534f" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="358" y="164" fill="#d9534f" font-size="9" font-weight="700">403 Forbidden</text>

  <!-- Amber sparkle -->
  <g transform="translate(666, 44)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>