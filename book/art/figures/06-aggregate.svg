<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420"
     role="img" aria-label="The Wallet aggregate root holds owner_id and a balance built from the Money value object, guards the invariant that balance is greater than or equal to zero through deposit, withdraw and open methods, and emits WalletOpened and FundsDeposited domain events"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="ag-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="ag-head-sm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <marker id="ag-emit" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#ffc24b"/>
    </marker>
    <filter id="ag-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
    <filter id="ag-sh-amber" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#c2410c" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="748" height="408" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- ===================== Wallet aggregate root ===================== -->
  <g filter="url(#ag-sh)">
    <rect x="40" y="40" width="430" height="340" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M40 51a11 11 0 0 1 11-11h408a11 11 0 0 1 11 11v22H40Z" fill="url(#ag-head)"/>
    <text x="255" y="62" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Wallet  «aggregate root»</text>
  </g>

  <!-- State section label -->
  <text x="64" y="96" fill="#7a8472" font-size="9.5" font-weight="700" letter-spacing="0.08em">STATE</text>

  <!-- owner_id field -->
  <text x="64" y="118" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">owner_id: OwnerId</text>
  <line x1="40" y1="130" x2="470" y2="130" stroke="#e7ece1" stroke-width="1"/>

  <!-- balance field -->
  <text x="64" y="150" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">balance: Money</text>
  <line x1="40" y1="162" x2="470" y2="162" stroke="#e7ece1" stroke-width="1"/>

  <!-- ===== Money value object chip (nested inside the aggregate) ===== -->
  <g filter="url(#ag-sh)">
    <rect x="64" y="176" width="190" height="58" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M64 187a11 11 0 0 1 11-11h168a11 11 0 0 1 11 11v13H64Z" fill="url(#ag-head-sm)"/>
    <text x="159" y="194" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">Money  «value object»</text>
  </g>
  <text x="159" y="220" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">amount, currency</text>

  <!-- composition line: Money is part of balance -->
  <line x1="159" y1="162" x2="159" y2="176" stroke="#3a9e23" stroke-width="1.6"/>

  <!-- ===== Invariant card (the rule the aggregate guards) ===== -->
  <g filter="url(#ag-sh-amber)">
    <rect x="276" y="176" width="170" height="58" rx="11" fill="#fffbe6" stroke="#ffc24b" stroke-width="2"/>
  </g>
  <!-- small amber shield mark -->
  <path d="M298 192 L309 188 L320 192 L320 200 a11 11 0 0 1 -11 9 a11 11 0 0 1 -11 -9 Z"
        fill="#ffc24b"/>
  <path d="M304.5 199 L307.5 202 L313.5 195" fill="none" stroke="#ffffff" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <text x="386" y="196" text-anchor="middle" fill="#c2410c" font-size="10.5" font-weight="700">«invariant»</text>
  <text x="361" y="224" text-anchor="middle" fill="#33402e" font-size="12" font-weight="700" font-family="ui-monospace,Menlo,monospace">balance &gt;= 0</text>

  <!-- divider before behaviour -->
  <line x1="40" y1="252" x2="470" y2="252" stroke="#e7ece1" stroke-width="1"/>

  <!-- Behaviour section label -->
  <text x="64" y="276" fill="#7a8472" font-size="9.5" font-weight="700" letter-spacing="0.08em">BEHAVIOUR  -  the only way in</text>

  <!-- methods, each as a step in how the wallet changes state -->
  <circle cx="76" cy="298" r="11" fill="#1f5e16"/><text x="76" y="302" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
  <text x="96" y="302" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">open(owner_id, currency)</text>

  <circle cx="76" cy="328" r="11" fill="#1f5e16"/><text x="76" y="332" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
  <text x="96" y="332" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">deposit(amount)</text>

  <circle cx="76" cy="358" r="11" fill="#1f5e16"/><text x="76" y="362" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
  <text x="96" y="362" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">withdraw(amount)</text>

  <!-- guard note next to withdraw -->
  <text x="290" y="346" fill="#7a8472" font-size="9.5">enforce the</text>
  <text x="290" y="360" fill="#c2410c" font-size="9.5" font-weight="700">invariant on</text>
  <text x="290" y="374" fill="#c2410c" font-size="9.5" font-weight="700">every change</text>

  <!-- ===================== Emitted domain events ===================== -->
  <text x="540" y="62" fill="#ffc24b" font-size="11" font-weight="700" letter-spacing="0.06em">EMITS</text>
  <text x="588" y="62" fill="#7a8472" font-size="9.5">domain events</text>

  <!-- emit arrows from aggregate right edge to event chips -->
  <path d="M470 105 L520 105 L520 100" fill="none" stroke="#ffc24b" stroke-width="2.4"
        stroke-dasharray="5,4" marker-end="url(#ag-emit)"/>
  <path d="M470 200 L500 200 L500 198 L520 198 L520 192" fill="none" stroke="#ffc24b" stroke-width="2.4"
        stroke-dasharray="5,4" marker-end="url(#ag-emit)"/>
  <path d="M470 360 L500 360 L500 296 L520 296 L520 290" fill="none" stroke="#ffc24b" stroke-width="2.4"
        stroke-dasharray="5,4" marker-end="url(#ag-emit)"/>

  <!-- event chip 1: WalletOpened -->
  <g filter="url(#ag-sh)">
    <rect x="512" y="82" width="206" height="40" rx="11" fill="#ffffff" stroke="#ffc24b" stroke-width="2"/>
  </g>
  <g transform="translate(536, 102)">
    <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z" fill="#ffc24b"/>
  </g>
  <text x="556" y="106" fill="#33402e" font-size="11" font-weight="700" font-family="ui-monospace,Menlo,monospace">WalletOpened</text>

  <!-- event chip 2: FundsDeposited -->
  <g filter="url(#ag-sh)">
    <rect x="512" y="174" width="206" height="40" rx="11" fill="#ffffff" stroke="#ffc24b" stroke-width="2"/>
  </g>
  <g transform="translate(536, 194)">
    <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z" fill="#ffc24b"/>
  </g>
  <text x="556" y="198" fill="#33402e" font-size="11" font-weight="700" font-family="ui-monospace,Menlo,monospace">FundsDeposited</text>

  <!-- event chip 3: FundsWithdrawn -->
  <g filter="url(#ag-sh)">
    <rect x="512" y="270" width="206" height="40" rx="11" fill="#ffffff" stroke="#ffc24b" stroke-width="2"/>
  </g>
  <g transform="translate(536, 290)">
    <path d="M0,-9 L2.2,-2.2 L9,0 L2.2,2.2 L0,9 L-2.2,2.2 L-9,0 L-2.2,-2.2 Z" fill="#ffc24b"/>
  </g>
  <text x="556" y="294" fill="#33402e" font-size="11" font-weight="700" font-family="ui-monospace,Menlo,monospace">FundsWithdrawn</text>

  <!-- buffered events note -->
  <text x="615" y="338" text-anchor="middle" fill="#7a8472" font-size="9.5">appended to the</text>
  <text x="615" y="352" text-anchor="middle" fill="#33402e" font-size="9.5" font-family="ui-monospace,Menlo,monospace">_pending_events</text>
  <text x="615" y="366" text-anchor="middle" fill="#7a8472" font-size="9.5">buffer; drained after save</text>
</svg>
