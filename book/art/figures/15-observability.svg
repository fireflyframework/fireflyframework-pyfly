<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260"
     role="img" aria-label="Observability figure: three pillars (Logs, Metrics, Traces) each feed into the Admin dashboard and actuator endpoints"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="700" height="260" fill="#eaf6df"/>

  <defs>
    <filter id="obs-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="obs-arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="obs-arr-g" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- Section label -->
  <text x="28" y="26" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">observability pillars — logs · metrics · traces → dashboard</text>

  <!-- ── Logs pillar ── -->
  <rect x="28" y="56" width="120" height="110" rx="10" ry="10"
        fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#obs-shadow)"/>
  <rect x="28" y="56" width="120" height="24" rx="10" ry="10" fill="#43b02a"/>
  <rect x="28" y="68" width="120" height="12" fill="#43b02a"/>
  <text x="88" y="68" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Logs</text>
  <!-- Log lines simulation -->
  <rect x="40" y="96" width="96" height="6" rx="3" ry="3" fill="#eaf6df"/>
  <rect x="40" y="108" width="78" height="6" rx="3" ry="3" fill="#eaf6df"/>
  <rect x="40" y="120" width="88" height="6" rx="3" ry="3" fill="#eaf6df"/>
  <rect x="40" y="132" width="60" height="6" rx="3" ry="3" fill="#eaf6df"/>
  <text x="88" y="154" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">structured JSON</text>

  <!-- ── Metrics pillar ── -->
  <rect x="185" y="56" width="120" height="110" rx="10" ry="10"
        fill="#fff" stroke="#5fd13a" stroke-width="2.5" filter="url(#obs-shadow)"/>
  <rect x="185" y="56" width="120" height="24" rx="10" ry="10" fill="#5fd13a"/>
  <rect x="185" y="68" width="120" height="12" fill="#5fd13a"/>
  <text x="245" y="68" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="700">Metrics</text>
  <!-- Bar chart -->
  <line x1="197" y1="148" x2="293" y2="148" stroke="#b8d9a0" stroke-width="1"/>
  <rect x="205" y="126" width="12" height="22" fill="#43b02a" opacity="0.6"/>
  <rect x="222" y="110" width="12" height="38" fill="#43b02a" opacity="0.8"/>
  <rect x="239" y="118" width="12" height="30" fill="#43b02a"/>
  <rect x="256" y="104" width="12" height="44" fill="#2c8a1c"/>
  <rect x="273" y="114" width="12" height="34" fill="#43b02a" opacity="0.7"/>
  <text x="245" y="154" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">Prometheus-style</text>

  <!-- ── Traces pillar ── -->
  <rect x="342" y="56" width="120" height="110" rx="10" ry="10"
        fill="#fff" stroke="#2c8a1c" stroke-width="2.5" filter="url(#obs-shadow)"/>
  <rect x="342" y="56" width="120" height="24" rx="10" ry="10" fill="#2c8a1c"/>
  <rect x="342" y="68" width="120" height="12" fill="#2c8a1c"/>
  <text x="402" y="68" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Traces</text>
  <!-- Span visualization -->
  <rect x="354" y="94" width="96" height="8" rx="4" ry="4" fill="#43b02a" opacity="0.85"/>
  <text x="402" y="98" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="7">root span</text>
  <rect x="360" y="108" width="70" height="8" rx="4" ry="4" fill="#5fd13a" opacity="0.85"/>
  <text x="395" y="112" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="7">db query</text>
  <rect x="366" y="122" width="48" height="8" rx="4" ry="4" fill="#43b02a" opacity="0.6"/>
  <text x="390" y="126" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="7">redis get</text>
  <text x="402" y="154" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">OpenTelemetry</text>

  <!-- Arrows → Admin dashboard -->
  <line x1="88" y1="166" x2="510" y2="210" stroke="#8aa07e" stroke-width="1.8" marker-end="url(#obs-arr)"/>
  <line x1="245" y1="166" x2="514" y2="210" stroke="#8aa07e" stroke-width="1.8" marker-end="url(#obs-arr)"/>
  <line x1="402" y1="166" x2="518" y2="210" stroke="#8aa07e" stroke-width="1.8" marker-end="url(#obs-arr)"/>

  <!-- ── Admin dashboard ── -->
  <rect x="494" y="186" width="180" height="60" rx="12" ry="12"
        fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#obs-shadow)"/>
  <rect x="494" y="186" width="180" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="494" y="198" width="180" height="12" fill="#43b02a"/>
  <text x="584" y="198" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Admin dashboard</text>
  <text x="584" y="228" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9.5">/admin · actuator endpoints</text>

  <!-- Amber sparkle -->
  <g transform="translate(666, 40)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>