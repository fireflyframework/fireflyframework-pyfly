<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260"
     role="img" aria-label="Cache-aside figure: Service checks Cache; a hit returns immediately (green, fast); a miss falls through to Database then populates the cache (dashed return arrow). Hit and miss paths labelled."
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="680" height="260" fill="#eaf6df"/>

  <defs>
    <filter id="cache-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="cache-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="cache-arrow-muted" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="cache-arrow-back" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffc24b"/>
    </marker>
  </defs>

  <!-- ── Service (left) ── -->
  <rect x="28" y="100" width="110" height="56" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#cache-shadow)"/>
  <rect x="28" y="100" width="110" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="28" y="112" width="110" height="12" fill="#43b02a"/>
  <text x="83" y="112" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Service</text>
  <text x="83" y="140" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">lookup(key)</text>

  <!-- Service → Cache arrow -->
  <line x1="138" y1="128" x2="196" y2="128"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#cache-arrow-green)"/>
  <text x="167" y="118" text-anchor="middle"
        fill="#43b02a" font-size="9" font-weight="600">check</text>

  <!-- ── Cache box (center) ── -->
  <rect x="198" y="100" width="110" height="56" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#cache-shadow)"/>
  <rect x="198" y="100" width="110" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="198" y="112" width="110" height="12" fill="#43b02a"/>
  <text x="253" y="112" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Cache</text>
  <text x="253" y="140" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">Redis / memory</text>

  <!-- ── HIT path: Cache returns to Service (up and left) ── -->
  <!-- Hit return arrow (curved upward from cache back to service) -->
  <path d="M 198 110 C 160 78 120 78 83 100"
        fill="none" stroke="#43b02a" stroke-width="2.5"
        marker-end="url(#cache-arrow-green)"/>
  <!-- HIT label -->
  <text x="140" y="70" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="700">HIT</text>
  <text x="140" y="83" text-anchor="middle"
        fill="#43b02a" font-size="9">fast return</text>

  <!-- ── MISS path: Cache → Database ── -->
  <line x1="308" y1="128" x2="364" y2="128"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#cache-arrow-muted)"/>
  <!-- MISS label -->
  <text x="336" y="118" text-anchor="middle"
        fill="#8aa07e" font-size="9" font-weight="600">MISS</text>

  <!-- Database cylinder (right) -->
  <!-- Cylinder body -->
  <rect x="366" y="108" width="100" height="40" fill="#fff" stroke="#2f7d1c" stroke-width="2"/>
  <!-- Top ellipse -->
  <ellipse cx="416" cy="108" rx="50" ry="12"
        fill="#43b02a" stroke="#2f7d1c" stroke-width="2"/>
  <!-- Bottom ellipse -->
  <ellipse cx="416" cy="148" rx="50" ry="12"
        fill="#5fd13a" stroke="#2f7d1c" stroke-width="2"/>
  <!-- Side fill -->
  <rect x="366" y="108" width="100" height="40" fill="#5fd13a"/>
  <!-- Top highlight -->
  <ellipse cx="404" cy="105" rx="16" ry="5" fill="#a0e070" opacity="0.5"/>
  <text x="416" y="130" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">Database</text>

  <!-- DB returns data to Service (bottom dashed path) -->
  <!-- DB → Cache populate (dashed amber arrow going left-up) -->
  <path d="M 366 148 C 310 200 253 200 253 156"
        fill="none" stroke="#ffc24b" stroke-width="2" stroke-dasharray="7,4"
        marker-end="url(#cache-arrow-back)"/>
  <text x="306" y="208" text-anchor="middle"
        fill="#ffc24b" font-size="9" font-weight="600">populate cache</text>

  <!-- DB → Service direct response (lower dashed green) -->
  <path d="M 366 140 C 270 195 150 195 83 156"
        fill="none" stroke="#8aa07e" stroke-width="1.8" stroke-dasharray="6,4"
        marker-end="url(#cache-arrow-muted)"/>
  <text x="215" y="218" text-anchor="middle"
        fill="#6a7a64" font-size="9" font-style="italic">return data</text>

  <!-- Amber sparkle top-right -->
  <g transform="translate(642, 44)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

  <!-- Legend -->
  <text x="28" y="30" dominant-baseline="middle"
        fill="#43b02a" font-size="11" font-weight="700">cache-aside pattern</text>

</svg>
