<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360"
     role="img" aria-label="Cache-aside read path: a request enters the cache decorator and triggers a cache lookup. On a hit the cached value returns immediately and the function body never runs. On a miss the service function executes, loads from the source, and the result is stored back into the cache."
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="ca-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="ca-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffc24b"/>
    </linearGradient>
    <marker id="ca-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="ca-ret" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#5b7a9d"/>
    </marker>
    <marker id="ca-amb" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#c08a14"/>
    </marker>
    <filter id="ca-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="768" height="348" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- title -->
  <text x="34" y="44" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">CACHE-ASIDE READ PATH</text>

  <!-- ===== forward arrows ===== -->
  <!-- Request -> Cache decorator -->
  <line x1="158" y1="120" x2="194" y2="120" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#ca-fwd)"/>
  <!-- Cache decorator -> Cache lookup -->
  <line x1="354" y1="120" x2="390" y2="120" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#ca-fwd)"/>

  <!-- ===== node 1: Request ===== -->
  <g filter="url(#ca-sh)">
    <rect x="38" y="82" width="120" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M38 93a11 11 0 0 1 11-11h98a11 11 0 0 1 11 11v17H38Z" fill="url(#ca-head)"/>
    <text x="98" y="99" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Request</text>
  </g>
  <text x="98" y="132" text-anchor="middle" fill="#33402e" font-size="10.5">balance(w-001)</text>
  <text x="98" y="148" text-anchor="middle" fill="#7a8472" font-size="9.5">read the wallet</text>
  <circle cx="50" cy="94" r="11" fill="#1f5e16"/><text x="50" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- ===== node 2: Cache decorator ===== -->
  <g filter="url(#ca-sh)">
    <rect x="194" y="82" width="160" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M194 93a11 11 0 0 1 11-11h138a11 11 0 0 1 11 11v17H194Z" fill="url(#ca-head)"/>
    <text x="274" y="99" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Cache decorator</text>
  </g>
  <text x="274" y="132" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">@cacheable</text>
  <text x="274" y="148" text-anchor="middle" fill="#7a8472" font-size="9.5">wraps the service method</text>
  <circle cx="206" cy="94" r="11" fill="#1f5e16"/><text x="206" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- ===== node 3: Cache lookup ===== -->
  <g filter="url(#ca-sh)">
    <rect x="390" y="82" width="150" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M390 93a11 11 0 0 1 11-11h128a11 11 0 0 1 11 11v17H390Z" fill="url(#ca-head)"/>
    <text x="465" y="99" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Cache lookup</text>
  </g>
  <text x="465" y="132" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">get(key)</text>
  <text x="465" y="148" text-anchor="middle" fill="#7a8472" font-size="9.5">Redis / in-memory</text>
  <circle cx="402" cy="94" r="11" fill="#1f5e16"/><text x="402" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- branch label off cache lookup -->
  <text x="555" y="106" fill="#7a8472" font-size="9.5" font-weight="600">found?</text>

  <!-- ===== HIT branch (upper, green dashed return to Request) ===== -->
  <!-- HIT badge near lookup -->
  <rect x="555" y="118" width="58" height="22" rx="11" fill="#eef3f8" stroke="#3a9e23" stroke-width="1.5"/>
  <text x="584" y="133" text-anchor="middle" fill="#2c8a1c" font-size="10.5" font-weight="700">HIT</text>

  <!-- hit return rail: from lookup top, up and back to Request top, slate dashed -->
  <path d="M465 82 L465 56 L98 56 L98 82" fill="none" stroke="#5b7a9d" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ca-ret)"/>
  <rect x="232" y="45" width="196" height="22" rx="11" fill="#eef3f8" stroke="#5b7a9d" stroke-width="1.5"/>
  <text x="330" y="60" text-anchor="middle" fill="#3f5b7a" font-size="10.5" font-weight="600">cached value - function body skipped</text>

  <!-- ===== MISS branch (lower) ===== -->
  <!-- MISS badge below lookup -->
  <rect x="436" y="172" width="58" height="22" rx="11" fill="#fff4d6" stroke="#c2410c" stroke-width="1.5"/>
  <text x="465" y="187" text-anchor="middle" fill="#c2410c" font-size="10.5" font-weight="700">MISS</text>

  <!-- lookup -> down -> Source (miss runs the function) -->
  <path d="M465 160 L465 206 L498 206" fill="none" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#ca-fwd)"/>

  <!-- ===== node 4: Source (Service body + database) ===== -->
  <g filter="url(#ca-sh)">
    <rect x="500" y="206" width="150" height="86" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M500 217a11 11 0 0 1 11-11h128a11 11 0 0 1 11 11v17H500Z" fill="url(#ca-head)"/>
    <text x="575" y="223" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Service + source</text>
  </g>
  <text x="575" y="256" text-anchor="middle" fill="#33402e" font-size="10.5">function body runs</text>
  <text x="575" y="272" text-anchor="middle" fill="#7a8472" font-size="9.5">SQL query / read replica</text>
  <circle cx="512" cy="218" r="11" fill="#1f5e16"/><text x="512" y="222" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>

  <!-- ===== node 5: Store result back (populate cache) ===== -->
  <g filter="url(#ca-sh)">
    <rect x="234" y="222" width="170" height="70" rx="11" fill="#ffffff" stroke="#ffc24b" stroke-width="2.2"/>
    <path d="M234 233a11 11 0 0 1 11-11h148a11 11 0 0 1 11 11v17H234Z" fill="url(#ca-amber)"/>
    <text x="319" y="239" text-anchor="middle" fill="#1c2420" font-size="13" font-weight="700">Store in cache</text>
  </g>
  <text x="319" y="270" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">put(key, value, ttl)</text>
  <circle cx="246" cy="234" r="11" fill="#1f5e16"/><text x="246" y="238" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>

  <!-- Source -> Store (populate, amber solid) -->
  <line x1="500" y1="257" x2="408" y2="257" stroke="#c08a14" stroke-width="2.4" marker-end="url(#ca-amb)"/>
  <text x="454" y="248" text-anchor="middle" fill="#c08a14" font-size="9.5" font-weight="600">result</text>

  <!-- Store -> back up into Cache lookup (populated), amber dashed -->
  <path d="M404 234 L404 234 L465 234 L465 160" fill="none" stroke="#c08a14" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#ca-amb)"/>
  <text x="438" y="226" text-anchor="middle" fill="#c08a14" font-size="9.5" font-weight="600">populate</text>

  <!-- Store -> back to Request (miss return), slate dashed -->
  <path d="M234 268 L98 268 L98 160" fill="none" stroke="#5b7a9d" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#ca-ret)"/>
  <rect x="118" y="300" width="120" height="22" rx="11" fill="#eef3f8" stroke="#5b7a9d" stroke-width="1.5"/>
  <text x="178" y="315" text-anchor="middle" fill="#3f5b7a" font-size="10.5" font-weight="600">computed value</text>

  <!-- legend -->
  <g transform="translate(34,326)">
    <line x1="0" y1="0" x2="26" y2="0" stroke="#3a9e23" stroke-width="2.4"/>
    <text x="32" y="4" fill="#33402e" font-size="9.5">forward / hit return</text>
    <line x1="170" y1="0" x2="196" y2="0" stroke="#5b7a9d" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="202" y="4" fill="#33402e" font-size="9.5">value to caller</text>
    <line x1="330" y1="0" x2="356" y2="0" stroke="#c08a14" stroke-width="2.2" stroke-dasharray="6,4"/>
    <text x="362" y="4" fill="#33402e" font-size="9.5">populate cache (miss)</text>
  </g>
</svg>
