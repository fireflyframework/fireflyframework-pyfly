<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420"
     role="img" aria-label="Configuration precedence: four layers from lowest to highest - framework defaults, then pyfly.yaml, then profile overlays, then environment variables. Later layers override earlier ones; environment variables always win."
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cf-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="cf-head-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd86b"/>
      <stop offset="1" stop-color="#ffc24b"/>
    </linearGradient>
    <marker id="cf-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <filter id="cf-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="748" height="408" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- title -->
  <text x="34" y="44" fill="#1c2420" font-size="15" font-weight="700">Configuration precedence</text>
  <text x="34" y="62" fill="#7a8472" font-size="10.5">four layers deep-merged bottom to top - later layers override earlier ones</text>

  <!-- ===== precedence rail (left): arrow pointing UP, "higher precedence" ===== -->
  <!-- shaft from bottom band up to top band -->
  <line x1="46" y1="372" x2="46" y2="106" stroke="#2c8a1c" stroke-width="2.4" marker-end="url(#cf-fwd)"/>
  <text x="30" y="240" text-anchor="middle" fill="#2c8a1c" font-size="11" font-weight="700"
        letter-spacing="0.06em" transform="rotate(-90, 30, 240)">HIGHER PRECEDENCE</text>

  <!-- ===== bands: x=80, w=572. Bottom (layer 1) to top (layer 4).
       band h=64, gap=14. y positions:
       layer1 y=308  layer2 y=230  layer3 y=152  layer4 y=88 (top, amber) =====
       Each band carries a step badge on the left and the dot-token / note on the right.
  -->

  <!-- override arrows between bands (left of badge column, x=72) pointing up -->
  <line x1="72" y1="306" x2="72" y2="296" stroke="#3a9e23" stroke-width="2" marker-end="url(#cf-fwd)"/>
  <line x1="72" y1="228" x2="72" y2="218" stroke="#3a9e23" stroke-width="2" marker-end="url(#cf-fwd)"/>
  <line x1="72" y1="150" x2="72" y2="140" stroke="#3a9e23" stroke-width="2" marker-end="url(#cf-fwd)"/>

  <!-- ===== Layer 1 (bottom, lowest precedence): Framework defaults ===== -->
  <g filter="url(#cf-sh)">
    <rect x="80" y="308" width="600" height="64" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M80 319a11 11 0 0 1 11-11h578a11 11 0 0 1 11 11v17H80Z" fill="url(#cf-head)"/>
    <text x="118" y="325" fill="#ffffff" font-size="13" font-weight="700">Framework defaults</text>
  </g>
  <text x="100" y="357" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">pyfly-defaults.yaml</text>
  <text x="262" y="357" fill="#7a8472" font-size="9.5">bundled baseline - complete working values for every key</text>
  <circle cx="100" cy="320" r="11" fill="#1f5e16"/>
  <text x="100" y="324" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- ===== Layer 2: pyfly.yaml ===== -->
  <g filter="url(#cf-sh)">
    <rect x="80" y="230" width="600" height="64" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M80 241a11 11 0 0 1 11-11h578a11 11 0 0 1 11 11v17H80Z" fill="url(#cf-head)"/>
    <text x="118" y="247" fill="#ffffff" font-size="13" font-weight="700">User config file</text>
  </g>
  <text x="100" y="279" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">pyfly.yaml</text>
  <text x="200" y="279" fill="#7a8472" font-size="9.5">project base - only the keys that differ from defaults</text>
  <circle cx="100" cy="242" r="11" fill="#1f5e16"/>
  <text x="100" y="246" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- ===== Layer 3: profile overlays ===== -->
  <g filter="url(#cf-sh)">
    <rect x="80" y="152" width="600" height="64" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M80 163a11 11 0 0 1 11-11h578a11 11 0 0 1 11 11v17H80Z" fill="url(#cf-head)"/>
    <text x="118" y="169" fill="#ffffff" font-size="13" font-weight="700">Profile overlays</text>
  </g>
  <text x="100" y="201" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">pyfly-{profile}.yaml</text>
  <text x="262" y="201" fill="#7a8472" font-size="9.5">per active profile - dev / staging / prod</text>
  <circle cx="100" cy="164" r="11" fill="#1f5e16"/>
  <text x="100" y="168" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- ===== Layer 4 (top, highest precedence): Environment variables - amber accent ===== -->
  <g filter="url(#cf-sh)">
    <rect x="80" y="88" width="600" height="50" rx="11" fill="#fffaf0" stroke="#ffc24b" stroke-width="2.5"/>
    <path d="M80 99a11 11 0 0 1 11-11h578a11 11 0 0 1 11 11v17H80Z" fill="url(#cf-head-amber)"/>
    <text x="118" y="105" fill="#23402a" font-size="13" font-weight="700">Environment variables</text>
    <text x="380" y="105" fill="#23402a" font-size="9.5" font-style="italic">checked at read time</text>
  </g>
  <text x="100" y="128" fill="#7a8472" font-size="9.5">highest precedence - always wins, even when set after startup</text>
  <circle cx="100" cy="100" r="11" fill="#1f5e16"/>
  <text x="100" y="104" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>

  <!-- "wins" badge on amber layer -->
  <rect x="610" y="91" width="56" height="22" rx="11" fill="#ffc24b"/>
  <text x="638" y="106" text-anchor="middle" fill="#23402a" font-size="11" font-weight="700">wins</text>

  <!-- footer note -->
  <text x="80" y="398" fill="#7a8472" font-size="9.5">Deep merge: nested keys merge key-by-key; scalars are replaced - you write only what changes.</text>
</svg>
