<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 330"
     role="img" aria-label="Configuration precedence: four layers bottom to top, later overrides earlier"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="640" height="330" fill="#eaf6df"/>

  <!-- ── "precedence" arrow on left margin (upward) ── -->
  <defs>
    <marker id="cfg-arrowup" markerWidth="10" markerHeight="8"
            refX="5" refY="0" orient="auto">
      <polygon points="0 8, 10 8, 5 0" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- Arrow shaft: from bottom of band4 up to top of band1 -->
  <line x1="34" y1="300" x2="34" y2="52"
        stroke="#43b02a" stroke-width="2.5"
        marker-end="url(#cfg-arrowup)"/>

  <!-- "precedence" label rotated, centered beside arrow -->
  <text x="20" y="185" text-anchor="middle"
        fill="#43b02a" font-size="11" font-weight="600"
        transform="rotate(-90, 20, 185)">precedence</text>

  <!-- ── Band layout (bottom→top in visual, top→bottom in SVG y-coords)
       Band 4 (bottom / lowest precedence): y=258  Framework defaults
       Band 3: y=182  pyfly.yaml
       Band 2: y=106  pyfly-{profile}.yaml
       Band 1 (top / highest precedence): y=30   Environment variables (amber)
       Each band h=64, gap=12, width=550, left=70
  ── -->

  <!-- Band 4 (bottom): Framework defaults -->
  <rect x="70" y="258" width="550" height="64" rx="12" ry="12"
        fill="#d8efc6" stroke="#43b02a" stroke-width="2"/>
  <text x="88" y="283" dominant-baseline="middle"
        fill="#16331a" font-size="14" font-weight="700">Framework defaults</text>
  <text x="88" y="304" dominant-baseline="middle"
        fill="#2c5a1f" font-size="12">built-in values baked into PyFly</text>

  <!-- Band 3: pyfly.yaml -->
  <rect x="70" y="182" width="550" height="64" rx="12" ry="12"
        fill="#bfe3a6" stroke="#43b02a" stroke-width="2"/>
  <text x="88" y="207" dominant-baseline="middle"
        fill="#16331a" font-size="14" font-weight="700">pyfly.yaml</text>
  <text x="88" y="228" dominant-baseline="middle"
        fill="#2c5a1f" font-size="12">project-level config file  ·  overrides defaults</text>

  <!-- Band 2: pyfly-{profile}.yaml -->
  <rect x="70" y="106" width="550" height="64" rx="12" ry="12"
        fill="#a7e76a" stroke="#43b02a" stroke-width="2"/>
  <text x="88" y="131" dominant-baseline="middle"
        fill="#16331a" font-size="14" font-weight="700">pyfly-{profile}.yaml</text>
  <text x="88" y="152" dominant-baseline="middle"
        fill="#2c5a1f" font-size="12">profile-specific overrides  (dev / staging / prod)</text>

  <!-- Band 1 (top): Environment variables — amber accent "wins" -->
  <rect x="70" y="30" width="550" height="64" rx="12" ry="12"
        fill="#fff8ea" stroke="#ffc24b" stroke-width="2.5"/>
  <text x="88" y="55" dominant-baseline="middle"
        fill="#23402a" font-size="14" font-weight="700">Environment variables</text>
  <text x="88" y="76" dominant-baseline="middle"
        fill="#6a7a64" font-size="12">highest precedence  ·  always wins</text>
  <!-- Amber "wins" badge -->
  <rect x="556" y="42" width="52" height="22" rx="11" ry="11"
        fill="#ffc24b"/>
  <text x="582" y="53" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="11" font-weight="700">wins</text>

</svg>
