<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 396"
     role="img" aria-label="PyFly four-layer architecture stacked top to bottom: Cross-Cutting, Infrastructure, Application, Foundation. Each layer depends on the layer below it; Foundation is the base."
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="ly-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <marker id="ly-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <filter id="ly-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="748" height="384" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- ===== "depends on" rail (left), points downward toward Foundation ===== -->
  <line x1="64" y1="56" x2="64" y2="356" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#ly-fwd)"/>
  <text x="40" y="206" text-anchor="middle" fill="#2c8a1c" font-size="11" font-weight="700"
        letter-spacing="0.08em" transform="rotate(-90, 40, 206)">DEPENDS ON</text>

  <!-- ===== layer bands: x=104, w=626, h=66 ; y = 44,124,204,284 ===== -->

  <!-- Band 1: Cross-Cutting -->
  <g filter="url(#ly-sh)">
    <rect x="104" y="44" width="626" height="66" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M104 55a11 11 0 0 1 11-11h604a11 11 0 0 1 11 11v15H104Z" fill="url(#ly-head)"/>
    <text x="142" y="62" fill="#ffffff" font-size="13" font-weight="700">Cross-Cutting</text>
  </g>
  <text x="142" y="93" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">aop &#183; observability &#183; logging &#183; testing</text>
  <circle cx="124" cy="57" r="11" fill="#1f5e16"/><text x="124" y="61" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- Band 2: Infrastructure -->
  <g filter="url(#ly-sh)">
    <rect x="104" y="124" width="626" height="66" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M104 135a11 11 0 0 1 11-11h604a11 11 0 0 1 11 11v15H104Z" fill="url(#ly-head)"/>
    <text x="142" y="142" fill="#ffffff" font-size="13" font-weight="700">Infrastructure</text>
  </g>
  <text x="142" y="173" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">web &#183; data &#183; messaging &#183; cache &#183; security</text>
  <circle cx="124" cy="137" r="11" fill="#1f5e16"/><text x="124" y="141" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- Band 3: Application -->
  <g filter="url(#ly-sh)">
    <rect x="104" y="204" width="626" height="66" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M104 215a11 11 0 0 1 11-11h604a11 11 0 0 1 11 11v15H104Z" fill="url(#ly-head)"/>
    <text x="142" y="222" fill="#ffffff" font-size="13" font-weight="700">Application</text>
  </g>
  <text x="142" y="253" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">validation &#183; cqrs &#183; eda</text>
  <circle cx="124" cy="217" r="11" fill="#1f5e16"/><text x="124" y="221" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- Band 4: Foundation (base) -->
  <g filter="url(#ly-sh)">
    <rect x="104" y="284" width="626" height="66" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M104 295a11 11 0 0 1 11-11h604a11 11 0 0 1 11 11v15H104Z" fill="url(#ly-head)"/>
    <text x="142" y="302" fill="#ffffff" font-size="13" font-weight="700">Foundation</text>
    <text x="722" y="302" text-anchor="end" fill="#dff3d4" font-size="9.5" font-weight="600" letter-spacing="0.06em">BASE LAYER</text>
  </g>
  <text x="142" y="333" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">kernel &#183; core &#183; container &#183; context &#183; config</text>
  <circle cx="124" cy="297" r="11" fill="#1f5e16"/><text x="124" y="301" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
</svg>
