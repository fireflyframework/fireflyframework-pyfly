<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340"
     role="img" aria-label="Bean lifecycle: the application context scans packages, registers bean definitions, resolves dependencies, runs @post_construct, reaches the ready serving state, then runs @pre_destroy on shutdown"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="lc-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="lc-ready" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#43b02a"/>
      <stop offset="1" stop-color="#2c8a1c"/>
    </linearGradient>
    <marker id="lc-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="lc-warn" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#c2410c"/>
    </marker>
    <filter id="lc-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="788" height="328" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- startup rail label -->
  <text x="34" y="52" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">STARTUP</text>
  <path d="M105 46 L119 46 M114 43 L119 46 L114 49" fill="none" stroke="#2c8a1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- shutdown rail label -->
  <text x="612" y="52" fill="#c2410c" font-size="11" font-weight="700" letter-spacing="0.08em">SHUTDOWN</text>
  <path d="M705 46 L719 46 M714 43 L719 46 L714 49" fill="none" stroke="#c2410c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== row 1: scan / register / resolve  (x = 40, 290, 540 ; w=200 h=86 y=82) ===== -->
  <!-- forward arrows row 1 (y=125) -->
  <line x1="242" y1="125" x2="288" y2="125" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#lc-fwd)"/>
  <line x1="492" y1="125" x2="538" y2="125" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#lc-fwd)"/>

  <!-- node 1 scan -->
  <g filter="url(#lc-sh)">
    <rect x="40" y="82" width="200" height="86" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M40 93a11 11 0 0 1 11-11h178a11 11 0 0 1 11 11v17H40Z" fill="url(#lc-head)"/>
    <text x="146" y="99" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">scan</text>
  </g>
  <text x="146" y="134" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">scan_packages</text>
  <text x="146" y="151" text-anchor="middle" fill="#7a8472" font-size="9.5">import each package</text>
  <circle cx="52" cy="94" r="11" fill="#1f5e16"/><text x="52" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- node 2 register -->
  <g filter="url(#lc-sh)">
    <rect x="290" y="82" width="200" height="86" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M290 93a11 11 0 0 1 11-11h178a11 11 0 0 1 11 11v17H290Z" fill="url(#lc-head)"/>
    <text x="390" y="99" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">register</text>
  </g>
  <text x="390" y="134" text-anchor="middle" fill="#33402e" font-size="10.5">bean definitions</text>
  <text x="390" y="151" text-anchor="middle" fill="#7a8472" font-size="9.5">stereotypes collected</text>
  <circle cx="302" cy="94" r="11" fill="#1f5e16"/><text x="302" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- node 3 resolve -->
  <g filter="url(#lc-sh)">
    <rect x="540" y="82" width="200" height="86" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M540 93a11 11 0 0 1 11-11h178a11 11 0 0 1 11 11v17H540Z" fill="url(#lc-head)"/>
    <text x="640" y="99" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">resolve</text>
  </g>
  <text x="640" y="134" text-anchor="middle" fill="#33402e" font-size="10.5">wire dependencies</text>
  <text x="640" y="151" text-anchor="middle" fill="#7a8472" font-size="9.5">construct singletons</text>
  <circle cx="552" cy="94" r="11" fill="#1f5e16"/><text x="552" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- connector resolve -> post_construct: down and back left -->
  <path d="M640 168 L640 196 L390 196 L390 218" fill="none" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#lc-fwd)"/>

  <!-- ===== row 2: @post_construct / ready  (x = 290, 540 ; w=200 h=86 y=224) ===== -->
  <!-- forward arrow row 2 (y=267) -->
  <line x1="492" y1="267" x2="538" y2="267" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#lc-fwd)"/>

  <!-- node 4 @post_construct -->
  <g filter="url(#lc-sh)">
    <rect x="290" y="224" width="200" height="86" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M290 235a11 11 0 0 1 11-11h178a11 11 0 0 1 11 11v17H290Z" fill="url(#lc-head)"/>
    <text x="390" y="241" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="ui-monospace,Menlo,monospace">@post_construct</text>
  </g>
  <text x="390" y="276" text-anchor="middle" fill="#33402e" font-size="10.5">init hook</text>
  <text x="390" y="293" text-anchor="middle" fill="#7a8472" font-size="9.5">runs after injection</text>
  <circle cx="302" cy="236" r="11" fill="#1f5e16"/><text x="302" y="240" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>

  <!-- node 5 ready (running state - green filled header + tint body) -->
  <g filter="url(#lc-sh)">
    <rect x="540" y="224" width="200" height="86" rx="11" fill="#f1faec" stroke="#2c8a1c" stroke-width="2"/>
    <path d="M540 235a11 11 0 0 1 11-11h178a11 11 0 0 1 11 11v17H540Z" fill="url(#lc-ready)"/>
    <text x="640" y="241" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">ready</text>
  </g>
  <text x="640" y="276" text-anchor="middle" fill="#2c8a1c" font-size="10.5" font-weight="600">serving requests</text>
  <text x="640" y="293" text-anchor="middle" fill="#7a8472" font-size="9.5">application_started</text>
  <circle cx="552" cy="236" r="11" fill="#1f5e16"/><text x="552" y="240" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>

  <!-- shutdown path: from ready right edge, dashed warn route up around the top row and down to @pre_destroy -->
  <path d="M740 267 L774 267 L774 64 L26 64 L26 196 L146 196 L146 218" fill="none" stroke="#c2410c" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#lc-warn)"/>

  <!-- node 6 @pre_destroy -->
  <g filter="url(#lc-sh)">
    <rect x="46" y="224" width="200" height="86" rx="11" fill="#fff8ea" stroke="#c2410c" stroke-width="2"/>
    <path d="M46 235a11 11 0 0 1 11-11h178a11 11 0 0 1 11 11v17H46Z" fill="#c2410c"/>
    <text x="146" y="241" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700" font-family="ui-monospace,Menlo,monospace">@pre_destroy</text>
  </g>
  <text x="146" y="276" text-anchor="middle" fill="#33402e" font-size="10.5">cleanup hook</text>
  <text x="146" y="293" text-anchor="middle" fill="#7a8472" font-size="9.5">reverse init order</text>
  <circle cx="58" cy="236" r="11" fill="#c2410c"/><text x="58" y="240" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
</svg>
