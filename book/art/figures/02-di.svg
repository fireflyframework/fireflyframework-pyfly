<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300"
     role="img" aria-label="Constructor injection: WalletService receives WalletRepository and EventPublisher from ApplicationContext"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="640" height="300" fill="#eaf6df"/>

  <!-- ── ApplicationContext outer container ── -->
  <rect x="20" y="20" width="600" height="260" rx="18" ry="18"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" opacity="0.55"/>
  <!-- Faint label top-left -->
  <text x="40" y="44" dominant-baseline="middle"
        fill="#6a7a64" font-size="12" font-weight="600" font-style="italic">ApplicationContext</text>

  <!-- ── Port chips (dependencies) ── -->

  <!-- WalletRepository port chip -->
  <rect x="48" y="88" width="148" height="44" rx="10" ry="10"
        fill="#eaf6df" stroke="#43b02a" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="48" y="88" width="148" height="20" rx="10" ry="10"
        fill="#43b02a"/>
  <rect x="48" y="98" width="148" height="10" fill="#43b02a"/>
  <text x="122" y="98" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">WalletRepository</text>
  <text x="122" y="119" text-anchor="middle" dominant-baseline="middle"
        fill="#2c5a1f" font-size="10">@repository</text>

  <!-- EventPublisher port chip -->
  <rect x="48" y="168" width="148" height="44" rx="10" ry="10"
        fill="#eaf6df" stroke="#43b02a" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="48" y="168" width="148" height="20" rx="10" ry="10"
        fill="#43b02a"/>
  <rect x="48" y="178" width="148" height="10" fill="#43b02a"/>
  <text x="122" y="178" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">EventPublisher</text>
  <text x="122" y="199" text-anchor="middle" dominant-baseline="middle"
        fill="#2c5a1f" font-size="10">@component</text>

  <!-- ── WalletService central box ── -->
  <defs>
    <filter id="di-shadow" x="-12%" y="-12%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#2c8a1c" flood-opacity="0.28"/>
    </filter>
    <marker id="di-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <rect x="276" y="98" width="164" height="104" rx="14" ry="14"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#di-shadow)"/>
  <!-- Header bar -->
  <rect x="276" y="98" width="164" height="28" rx="14" ry="14"
        fill="#43b02a"/>
  <rect x="276" y="112" width="164" height="14" fill="#43b02a"/>
  <text x="358" y="112" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="13" font-weight="700">WalletService</text>
  <text x="358" y="147" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">__init__(</text>
  <text x="358" y="162" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">  repo, publisher</text>
  <text x="358" y="177" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">)</text>

  <!-- ── Arrows from port chips to WalletService ── -->
  <!-- WalletRepository → WalletService -->
  <line x1="196" y1="110" x2="274" y2="130"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#di-arrow)"/>
  <!-- "injected" label on arrow 1 -->
  <text x="228" y="113" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="600">injected</text>

  <!-- EventPublisher → WalletService -->
  <line x1="196" y1="190" x2="274" y2="170"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#di-arrow)"/>
  <!-- "injected" label on arrow 2 -->
  <text x="228" y="196" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="600">injected</text>

</svg>
