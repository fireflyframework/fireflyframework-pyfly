<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300"
     role="img" aria-label="CQRS two-lane diagram: Controller dispatches Commands via CommandBus to TransferFundsHandler writing to DB; and Queries via QueryBus to GetBalanceHandler reading from read model"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="700" height="300" fill="#eaf6df"/>

  <defs>
    <filter id="cqrs-shadow" x="-10%" y="-10%" width="126%" height="126%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="cqrs-arrow-write" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="cqrs-arrow-read" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- ── Lane backgrounds ── -->
  <!-- Write lane: top half -->
  <rect x="0" y="0" width="700" height="148" rx="0" ry="0" fill="#f2faf0" opacity="0.7"/>
  <!-- Read lane: bottom half -->
  <rect x="0" y="150" width="700" height="150" rx="0" ry="0" fill="#f8fbf6" opacity="0.7"/>

  <!-- Lane separator -->
  <line x1="0" y1="150" x2="700" y2="150" stroke="#b8d9a0" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- Lane labels -->
  <text x="12" y="30" dominant-baseline="middle"
        fill="#43b02a" font-size="12" font-weight="700">writes</text>
  <text x="12" y="215" dominant-baseline="middle"
        fill="#8aa07e" font-size="12" font-weight="700">reads</text>

  <!-- ── Controller box (left, spans both lanes) ── -->
  <rect x="36" y="96" width="100" height="60" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#cqrs-shadow)"/>
  <!-- Header -->
  <rect x="36" y="96" width="100" height="24" rx="12" ry="12" fill="#43b02a"/>
  <rect x="36" y="108" width="100" height="12" fill="#43b02a"/>
  <text x="86" y="108" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Controller</text>
  <text x="86" y="136" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">POST / GET</text>

  <!-- Fork arrows from Controller -->
  <!-- Up-right to CommandBus -->
  <polyline points="136,114 162,90 196,90"
            fill="none" stroke="#43b02a" stroke-width="2"
            marker-end="url(#cqrs-arrow-write)"/>
  <!-- Down-right to QueryBus -->
  <polyline points="136,144 162,210 196,210"
            fill="none" stroke="#8aa07e" stroke-width="2"
            marker-end="url(#cqrs-arrow-read)"/>

  <!-- ── CommandBus box (write lane) ── -->
  <rect x="198" y="66" width="110" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#cqrs-shadow)"/>
  <!-- Header -->
  <rect x="198" y="66" width="110" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="198" y="78" width="110" height="10" fill="#43b02a"/>
  <text x="253" y="77" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">CommandBus</text>
  <text x="253" y="102" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">dispatch(cmd)</text>

  <!-- CommandBus → TransferFundsHandler -->
  <line x1="308" y1="90" x2="348" y2="90"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#cqrs-arrow-write)"/>

  <!-- ── TransferFundsHandler box ── -->
  <rect x="350" y="62" width="158" height="56" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#cqrs-shadow)"/>
  <!-- Header -->
  <rect x="350" y="62" width="158" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="350" y="74" width="158" height="10" fill="#43b02a"/>
  <text x="429" y="73" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">TransferFundsHandler</text>
  <text x="429" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">handle(cmd)</text>

  <!-- TransferFundsHandler → write model DB -->
  <line x1="508" y1="90" x2="548" y2="90"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#cqrs-arrow-write)"/>

  <!-- Write model DB cylinder (small) -->
  <ellipse cx="590" cy="78" rx="36" ry="11" fill="#43b02a" stroke="#2f7d1c" stroke-width="1.8"/>
  <rect x="554" y="78" width="72" height="40" fill="#5fd13a" stroke="#2f7d1c" stroke-width="1.8"/>
  <ellipse cx="590" cy="118" rx="36" ry="11" fill="#43b02a" stroke="#2f7d1c" stroke-width="1.8"/>
  <ellipse cx="580" cy="75" rx="12" ry="4" fill="#a0e070" opacity="0.5"/>
  <text x="590" y="100" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">write DB</text>

  <!-- ── QueryBus box (read lane) ── -->
  <rect x="198" y="186" width="110" height="48" rx="10" ry="10"
        fill="#eaf6df" stroke="#8aa07e" stroke-width="2" filter="url(#cqrs-shadow)"/>
  <!-- Header -->
  <rect x="198" y="186" width="110" height="22" rx="10" ry="10" fill="#8aa07e"/>
  <rect x="198" y="198" width="110" height="10" fill="#8aa07e"/>
  <text x="253" y="197" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">QueryBus</text>
  <text x="253" y="222" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">dispatch(qry)</text>

  <!-- QueryBus → GetBalanceHandler -->
  <line x1="308" y1="210" x2="348" y2="210"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#cqrs-arrow-read)"/>

  <!-- ── GetBalanceHandler box ── -->
  <rect x="350" y="182" width="158" height="56" rx="10" ry="10"
        fill="#eaf6df" stroke="#8aa07e" stroke-width="2" filter="url(#cqrs-shadow)"/>
  <!-- Header -->
  <rect x="350" y="182" width="158" height="22" rx="10" ry="10" fill="#8aa07e"/>
  <rect x="350" y="194" width="158" height="10" fill="#8aa07e"/>
  <text x="429" y="193" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">GetBalanceHandler</text>
  <text x="429" y="220" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">handle(qry)</text>

  <!-- GetBalanceHandler → read model -->
  <line x1="508" y1="210" x2="548" y2="210"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#cqrs-arrow-read)"/>

  <!-- Read model box -->
  <rect x="550" y="186" width="110" height="48" rx="10" ry="10"
        fill="#f0f8ea" stroke="#8aa07e" stroke-width="2"/>
  <rect x="550" y="186" width="110" height="22" rx="10" ry="10" fill="#8aa07e"/>
  <rect x="550" y="198" width="110" height="10" fill="#8aa07e"/>
  <text x="605" y="197" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">read model</text>
  <text x="605" y="222" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">view / cache</text>

</svg>
