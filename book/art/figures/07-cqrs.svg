<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 348"
     role="img" aria-label="CQRS two-lane diagram: the Controller dispatches commands through the CommandBus to TransferFundsHandler which writes to the write DB; and queries through the QueryBus to GetBalanceHandler which reads from the read model"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="cq-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cbb2f"/>
      <stop offset="1" stop-color="#3a9e23"/>
    </linearGradient>
    <linearGradient id="cq-head-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b7a9d"/>
      <stop offset="1" stop-color="#3f5b7a"/>
    </linearGradient>
    <marker id="cq-fwd" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#3a9e23"/>
    </marker>
    <marker id="cq-read" markerWidth="9" markerHeight="9" refX="6.5" refY="3.2" orient="auto">
      <path d="M0 0L7 3.2L0 6.4Z" fill="#5b7a9d"/>
    </marker>
    <filter id="cq-sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1f5e16" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="788" height="336" rx="16" fill="#ffffff" stroke="#e0e8d6" stroke-width="1.5"/>

  <!-- lane separator -->
  <line x1="200" y1="174" x2="770" y2="174" stroke="#e7ece1" stroke-width="1.5" stroke-dasharray="6,5"/>

  <!-- ===== lane labels ===== -->
  <!-- write lane label -->
  <text x="240" y="50" fill="#2c8a1c" font-size="11" font-weight="700" letter-spacing="0.08em">WRITES &#183; COMMANDS</text>
  <path d="M392 44 L406 44 M401 41 L406 44 L401 47" fill="none" stroke="#2c8a1c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- read lane label -->
  <text x="240" y="316" fill="#5b7a9d" font-size="11" font-weight="700" letter-spacing="0.08em">READS &#183; QUERIES</text>
  <path d="M380 310 L394 310 M389 307 L394 310 L389 313" fill="none" stroke="#5b7a9d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== Controller (left, spans both lanes) ===== -->
  <g filter="url(#cq-sh)">
    <rect x="34" y="135" width="130" height="78" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M34 146a11 11 0 0 1 11-11h108a11 11 0 0 1 11 11v17H34Z" fill="url(#cq-head)"/>
    <text x="99" y="152" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Controller</text>
  </g>
  <text x="99" y="185" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">POST / GET</text>
  <text x="99" y="201" text-anchor="middle" fill="#7a8472" font-size="9.5">route handler</text>
  <circle cx="46" cy="147" r="11" fill="#1f5e16"/><text x="46" y="151" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>

  <!-- ===== fork connectors from Controller ===== -->
  <!-- up to CommandBus -->
  <path d="M164 158 L184 158 L184 96 L222 96" fill="none" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#cq-fwd)"/>
  <!-- down to QueryBus -->
  <path d="M164 190 L184 190 L184 252 L222 252" fill="none" stroke="#5b7a9d" stroke-width="2.4" stroke-dasharray="5,4" marker-end="url(#cq-read)"/>

  <!-- ===== WRITE LANE: CommandBus -> TransferFundsHandler -> write DB (y center 96) ===== -->
  <!-- arrows -->
  <line x1="356" y1="96" x2="382" y2="96" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#cq-fwd)"/>
  <line x1="556" y1="96" x2="582" y2="96" stroke="#3a9e23" stroke-width="2.4" marker-end="url(#cq-fwd)"/>

  <!-- CommandBus -->
  <g filter="url(#cq-sh)">
    <rect x="224" y="62" width="130" height="68" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M224 73a11 11 0 0 1 11-11h108a11 11 0 0 1 11 11v17H224Z" fill="url(#cq-head)"/>
    <text x="289" y="79" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">CommandBus</text>
  </g>
  <text x="289" y="112" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">send(cmd)</text>
  <circle cx="236" cy="74" r="11" fill="#1f5e16"/><text x="236" y="78" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- TransferFundsHandler -->
  <g filter="url(#cq-sh)">
    <rect x="384" y="56" width="172" height="80" rx="11" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <path d="M384 67a11 11 0 0 1 11-11h150a11 11 0 0 1 11 11v17H384Z" fill="url(#cq-head)"/>
    <text x="470" y="73" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">TransferFundsHandler</text>
  </g>
  <text x="470" y="106" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">handle(cmd)</text>
  <text x="470" y="122" text-anchor="middle" fill="#7a8472" font-size="9.5">mutates state</text>
  <circle cx="396" cy="68" r="11" fill="#1f5e16"/><text x="396" y="72" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- write DB cylinder -->
  <g filter="url(#cq-sh)">
    <path d="M584 78 a32 11 0 0 1 64 0 v32 a32 11 0 0 1 -64 0 Z" fill="#ffffff" stroke="#3a9e23" stroke-width="2"/>
    <ellipse cx="616" cy="78" rx="32" ry="11" fill="url(#cq-head)" stroke="#3a9e23" stroke-width="2"/>
  </g>
  <text x="616" y="104" text-anchor="middle" fill="#1c2420" font-size="11" font-weight="700">write DB</text>
  <text x="616" y="132" text-anchor="middle" fill="#7a8472" font-size="9.5">source of truth</text>

  <!-- ===== READ LANE: QueryBus -> GetBalanceHandler -> read model (y center 252) ===== -->
  <!-- arrows -->
  <line x1="356" y1="252" x2="382" y2="252" stroke="#5b7a9d" stroke-width="2.4" stroke-dasharray="5,4" marker-end="url(#cq-read)"/>
  <line x1="556" y1="252" x2="582" y2="252" stroke="#5b7a9d" stroke-width="2.4" stroke-dasharray="5,4" marker-end="url(#cq-read)"/>

  <!-- QueryBus -->
  <g filter="url(#cq-sh)">
    <rect x="224" y="218" width="130" height="68" rx="11" fill="#ffffff" stroke="#5b7a9d" stroke-width="2"/>
    <path d="M224 229a11 11 0 0 1 11-11h108a11 11 0 0 1 11 11v17H224Z" fill="url(#cq-head-slate)"/>
    <text x="289" y="235" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">QueryBus</text>
  </g>
  <text x="289" y="268" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">query(qry)</text>
  <circle cx="236" cy="230" r="11" fill="#1f5e16"/><text x="236" y="234" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>

  <!-- GetBalanceHandler -->
  <g filter="url(#cq-sh)">
    <rect x="384" y="212" width="172" height="80" rx="11" fill="#ffffff" stroke="#5b7a9d" stroke-width="2"/>
    <path d="M384 223a11 11 0 0 1 11-11h150a11 11 0 0 1 11 11v17H384Z" fill="url(#cq-head-slate)"/>
    <text x="470" y="229" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">GetBalanceHandler</text>
  </g>
  <text x="470" y="262" text-anchor="middle" fill="#33402e" font-size="10.5" font-family="ui-monospace,Menlo,monospace">handle(qry)</text>
  <text x="470" y="278" text-anchor="middle" fill="#7a8472" font-size="9.5">returns a DTO</text>
  <circle cx="396" cy="224" r="11" fill="#1f5e16"/><text x="396" y="228" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>

  <!-- read model -->
  <g filter="url(#cq-sh)">
    <rect x="582" y="218" width="130" height="68" rx="11" fill="#ffffff" stroke="#5b7a9d" stroke-width="2"/>
    <path d="M582 229a11 11 0 0 1 11-11h108a11 11 0 0 1 11 11v17H582Z" fill="url(#cq-head-slate)"/>
    <text x="647" y="235" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">read model</text>
  </g>
  <text x="647" y="268" text-anchor="middle" fill="#33402e" font-size="10.5">view / cache</text>
  <text x="647" y="283" text-anchor="middle" fill="#7a8472" font-size="9.5">read-optimized</text>
</svg>
