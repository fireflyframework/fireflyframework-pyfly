<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 4 opener: HTTP API — GET /wallets pill flows through Controller to JSON response"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left, same drawing as ch01) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── HTTP request/response flow (right side) ── -->
  <defs>
    <marker id="ch04-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <filter id="ch04-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- GET /wallets pill (request) -->
  <rect x="322" y="110" width="130" height="36" rx="18" ry="18"
        fill="#ffffff" stroke="#43b02a" stroke-width="2"/>
  <!-- Method badge -->
  <rect x="322" y="110" width="42" height="36" rx="18" ry="18"
        fill="#43b02a"/>
  <rect x="342" y="110" width="22" height="36" fill="#43b02a"/>
  <text x="343" y="128" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="11" font-weight="700">GET</text>
  <text x="406" y="128" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="11" font-weight="600">/wallets</text>

  <!-- Arrow: pill → Controller -->
  <line x1="453" y1="128" x2="490" y2="128"
        stroke="#43b02a" stroke-width="3"
        marker-end="url(#ch04-arrow)"/>

  <!-- Controller rounded box with green header -->
  <rect x="492" y="95" width="120" height="66" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch04-shadow)"/>
  <!-- Header bar -->
  <rect x="492" y="95" width="120" height="26" rx="12" ry="12"
        fill="#43b02a"/>
  <rect x="492" y="107" width="120" height="14" fill="#43b02a"/>
  <text x="552" y="108" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="12" font-weight="700">Controller</text>
  <text x="552" y="138" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">handle(request)</text>

  <!-- Arrow: Controller → JSON response -->
  <line x1="613" y1="128" x2="648" y2="128"
        stroke="#43b02a" stroke-width="3"
        marker-end="url(#ch04-arrow)"/>

  <!-- JSON response card -->
  <rect x="650" y="100" width="54" height="56" rx="10" ry="10"
        fill="#ffffff" stroke="#8aa07e" stroke-width="1.8"/>
  <text x="677" y="121" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11" font-weight="600">{ }</text>
  <text x="677" y="141" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">JSON</text>

  <!-- Amber sparkles -->
  <g transform="translate(352, 82)">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#ffc24b"/>
  </g>
  <g transform="translate(474, 175)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b" opacity="0.85"/>
  </g>
  <g transform="translate(630, 82)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#ffc24b" opacity="0.75"/>
  </g>

</svg>
