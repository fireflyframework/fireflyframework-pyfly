<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 1 opener: infinite choice becomes cohesion with PyFly"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left, ~140px tall, no enclosing circle) ── -->
  <!-- Drop-shadow ellipse beneath body -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <!-- Snake body: curved path representing the body coil -->
  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <!-- Slight tail curl -->
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head ellipse centered around (148,68) -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <!-- Eye shine -->
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>

  <!-- Smile -->
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Tiny tongue -->
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- ── Choice → Cohesion diagram (right side) ── -->

  <!-- Three tilted option cards -->
  <!-- Card 1: Flask? — tilted left -->
  <g transform="translate(370, 90) rotate(-8)">
    <rect x="-44" y="-20" width="88" height="40" rx="8" ry="8"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" fill="#6a7a64"
          font-size="16" font-weight="600">Flask?</text>
  </g>

  <!-- Card 2: Kafka? — tilted right -->
  <g transform="translate(390, 148) rotate(6)">
    <rect x="-46" y="-20" width="92" height="40" rx="8" ry="8"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" fill="#6a7a64"
          font-size="16" font-weight="600">Kafka?</text>
  </g>

  <!-- Card 3: ORM? — slightly tilted -->
  <g transform="translate(368, 206) rotate(-4)">
    <rect x="-40" y="-20" width="80" height="40" rx="8" ry="8"
          fill="#ffffff" stroke="#8aa07e" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" fill="#6a7a64"
          font-size="16" font-weight="600">ORM?</text>
  </g>

  <!-- Amber sparkles scattered -->
  <!-- 4-point star helper paths -->
  <!-- Sparkle 1 -->
  <g transform="translate(480, 75)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>
  <!-- Sparkle 2 smaller -->
  <g transform="translate(340, 175)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b"/>
  </g>
  <!-- Sparkle 3 tiny -->
  <g transform="translate(510, 200)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#ffc24b" opacity="0.8"/>
  </g>
  <!-- Sparkle 4 -->
  <g transform="translate(460, 235)">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#ffc24b" opacity="0.7"/>
  </g>

  <!-- Big green arrow -->
  <defs>
    <marker id="ch01-arrowhead" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>
  <line x1="468" y1="148" x2="552" y2="148"
        stroke="#43b02a" stroke-width="5"
        marker-end="url(#ch01-arrowhead)"/>

  <!-- PyFly destination box -->
  <rect x="564" y="110" width="130" height="76" rx="16" ry="16"
        fill="#43b02a" filter="url(#ch01-shadow)"/>
  <text x="629" y="148" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="26" font-weight="700"
        letter-spacing="0.5">PyFly</text>

  <!-- Soft drop-shadow filter for PyFly box -->
  <defs>
    <filter id="ch01-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Decorative section divider: faint vertical line -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

</svg>
