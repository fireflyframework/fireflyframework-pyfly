<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 9 opener: Event Sourcing — Sparky beside an append-only event log with WalletOpened, FundsDeposited, FundsWithdrawn cards, a replay arrow to a Wallet state box, and a snapshot tag"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── Event Sourcing diagram ── -->
  <defs>
    <filter id="ch09-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch09-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- Event log label -->
  <text x="365" y="42" text-anchor="middle" fill="#43b02a" font-size="11" font-weight="700">EventStore (append-only)</text>

  <!-- Event cards stacked vertically -->
  <!-- Card 1: WalletOpened -->
  <rect x="318" y="52" width="96" height="32" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch09-shadow)"/>
  <rect x="318" y="52" width="96" height="14" rx="6" ry="6" fill="#43b02a"/>
  <rect x="318" y="59" width="96" height="7" fill="#43b02a"/>
  <text x="366" y="59" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9" font-weight="700">WalletOpened</text>
  <text x="366" y="76" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8">seq: 1</text>

  <!-- Card 2: FundsDeposited -->
  <rect x="318" y="92" width="96" height="32" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch09-shadow)"/>
  <rect x="318" y="92" width="96" height="14" rx="6" ry="6" fill="#43b02a"/>
  <rect x="318" y="99" width="96" height="7" fill="#43b02a"/>
  <text x="366" y="99" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9" font-weight="700">FundsDeposited</text>
  <text x="366" y="116" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8">seq: 2</text>

  <!-- Card 3: FundsWithdrawn -->
  <rect x="318" y="132" width="96" height="32" rx="6" ry="6"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch09-shadow)"/>
  <rect x="318" y="132" width="96" height="14" rx="6" ry="6" fill="#43b02a"/>
  <rect x="318" y="139" width="96" height="7" fill="#43b02a"/>
  <text x="366" y="139" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="9" font-weight="700">FundsWithdrawn</text>
  <text x="366" y="156" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="8">seq: 3</text>

  <!-- Snapshot tag -->
  <rect x="424" y="92" width="64" height="22" rx="10" ry="10"
        fill="#ffc24b" stroke="#e89c00" stroke-width="1.5"/>
  <text x="456" y="103" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9" font-weight="700">snapshot</text>

  <!-- replay arrow -->
  <line x1="414" y1="116" x2="494" y2="116"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#ch09-arrow)"/>
  <text x="454" y="108" text-anchor="middle" fill="#43b02a" font-size="10" font-weight="600">replay →</text>

  <!-- Wallet state box -->
  <rect x="496" y="96" width="88" height="44" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch09-shadow)"/>
  <rect x="496" y="96" width="88" height="20" rx="10" ry="10" fill="#43b02a"/>
  <rect x="496" y="106" width="88" height="10" fill="#43b02a"/>
  <text x="540" y="106" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">Wallet</text>
  <text x="540" y="128" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">balance: £750</text>

  <!-- Amber star on log -->
  <g transform="translate(630, 85)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>
