<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 12 opener: Sagas — Sparky beside three sequential step boxes Debit, Pay, Notify with a curved amber compensation arrow looping back under them on failure"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── Saga step diagram ── -->
  <defs>
    <filter id="ch12-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch12-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="ch12-arrow-comp" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d9534f"/>
    </marker>
  </defs>

  <!-- Step 1: Debit -->
  <rect x="318" y="100" width="86" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch12-shadow)"/>
  <rect x="318" y="100" width="86" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="318" y="112" width="86" height="10" fill="#43b02a"/>
  <text x="361" y="111" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">Debit</text>
  <text x="361" y="136" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">wallet</text>

  <!-- Arrow 1→2 -->
  <line x1="404" y1="124" x2="430" y2="124"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#ch12-arrow-green)"/>

  <!-- Step 2: Pay -->
  <rect x="432" y="100" width="86" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch12-shadow)"/>
  <rect x="432" y="100" width="86" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="432" y="112" width="86" height="10" fill="#43b02a"/>
  <text x="475" y="111" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">Pay</text>
  <text x="475" y="136" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">capture</text>

  <!-- Arrow 2→3 -->
  <line x1="518" y1="124" x2="546" y2="124"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#ch12-arrow-green)"/>

  <!-- Step 3: Notify -->
  <rect x="548" y="100" width="86" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch12-shadow)"/>
  <rect x="548" y="100" width="86" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="548" y="112" width="86" height="10" fill="#43b02a"/>
  <text x="591" y="111" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="11" font-weight="700">Notify</text>
  <text x="591" y="136" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">user</text>

  <!-- Compensation curved arrow (looping back under) -->
  <path d="M 518 152 C 518 200 404 200 404 152"
        fill="none" stroke="#d9534f" stroke-width="2" stroke-dasharray="6,4"
        marker-end="url(#ch12-arrow-comp)"/>
  <text x="461" y="216" text-anchor="middle"
        fill="#d9534f" font-size="9" font-weight="600">compensate (undo)</text>

  <!-- Amber sparkle -->
  <g transform="translate(660, 90)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>
