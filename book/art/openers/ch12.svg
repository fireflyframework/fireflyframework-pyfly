<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 12: Sagas — three sequential steps Debit, Pay, Notify with a curved red compensation arrow looping back on failure"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="ch12-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch12-arrow-green" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <marker id="ch12-arrow-comp" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d9534f"/>
    </marker>
  </defs>

  <!-- Step 1: Debit -->
  <rect x="74" y="92" width="158" height="68" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch12-shadow)"/>
  <rect x="74" y="92" width="158" height="30" rx="12" ry="12" fill="#43b02a"/>
  <rect x="74" y="108" width="158" height="14" fill="#43b02a"/>
  <text x="153" y="107" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="15" font-weight="700">Debit</text>
  <text x="153" y="142" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11">wallet</text>

  <!-- Arrow 1→2 -->
  <line x1="233" y1="126" x2="275" y2="126"
        stroke="#43b02a" stroke-width="2.5"
        marker-end="url(#ch12-arrow-green)"/>

  <!-- Step 2: Pay -->
  <rect x="277" y="92" width="158" height="68" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch12-shadow)"/>
  <rect x="277" y="92" width="158" height="30" rx="12" ry="12" fill="#43b02a"/>
  <rect x="277" y="108" width="158" height="14" fill="#43b02a"/>
  <text x="356" y="107" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="15" font-weight="700">Pay</text>
  <text x="356" y="142" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11">capture</text>

  <!-- Arrow 2→3 -->
  <line x1="436" y1="126" x2="478" y2="126"
        stroke="#43b02a" stroke-width="2.5"
        marker-end="url(#ch12-arrow-green)"/>

  <!-- Step 3: Notify -->
  <rect x="480" y="92" width="158" height="68" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch12-shadow)"/>
  <rect x="480" y="92" width="158" height="30" rx="12" ry="12" fill="#43b02a"/>
  <rect x="480" y="108" width="158" height="14" fill="#43b02a"/>
  <text x="559" y="107" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="15" font-weight="700">Notify</text>
  <text x="559" y="142" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11">user</text>

  <!-- Compensation curved arrow (looping back under) -->
  <path d="M 436 164 C 436 220 233 220 233 164"
        fill="none" stroke="#d9534f" stroke-width="2.5" stroke-dasharray="8,5"
        marker-end="url(#ch12-arrow-comp)"/>
  <text x="334" y="240" text-anchor="middle"
        fill="#d9534f" font-size="12" font-weight="600">compensate (undo)</text>

  <!-- Amber sparkle -->
  <g transform="translate(660, 72)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>
  <g transform="translate(56, 58)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b" opacity="0.7"/>
  </g>

</svg>
