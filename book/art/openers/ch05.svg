<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 5 opener: Persistence — Sparky beside WalletRepository saving to a database"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── WalletRepository box ── -->
  <defs>
    <filter id="ch05-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch05-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- WalletRepository box -->
  <rect x="330" y="60" width="190" height="140" rx="14" ry="14"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch05-shadow)"/>
  <!-- Header bar -->
  <rect x="330" y="60" width="190" height="30" rx="14" ry="14" fill="#43b02a"/>
  <rect x="330" y="78" width="190" height="12" fill="#43b02a"/>
  <text x="425" y="75" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="13" font-weight="700">WalletRepository</text>

  <!-- Method rows -->
  <line x1="330" y1="110" x2="520" y2="110" stroke="#b8d9a0" stroke-width="1"/>
  <text x="350" y="127" dominant-baseline="middle"
        fill="#2c5a1f" font-size="11" font-family="monospace,monospace">save(wallet)</text>
  <line x1="330" y1="143" x2="520" y2="143" stroke="#b8d9a0" stroke-width="1"/>
  <text x="350" y="160" dominant-baseline="middle"
        fill="#2c5a1f" font-size="11" font-family="monospace,monospace">find(id)</text>
  <line x1="330" y1="175" x2="520" y2="175" stroke="#b8d9a0" stroke-width="1"/>
  <text x="350" y="192" dominant-baseline="middle"
        fill="#2c5a1f" font-size="11" font-family="monospace,monospace">find_all()</text>

  <!-- Arrow from repository to DB cylinder -->
  <line x1="522" y1="130" x2="568" y2="130"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#ch05-arrow)"/>

  <!-- Database cylinder -->
  <!-- top ellipse -->
  <ellipse cx="620" cy="112" rx="40" ry="14" fill="#43b02a" stroke="#2f7d1c" stroke-width="2"/>
  <!-- body -->
  <rect x="580" y="112" width="80" height="60" fill="#5fd13a" stroke="#2f7d1c" stroke-width="2"/>
  <!-- bottom ellipse -->
  <ellipse cx="620" cy="172" rx="40" ry="14" fill="#43b02a" stroke="#2f7d1c" stroke-width="2"/>
  <!-- sheen on top ellipse -->
  <ellipse cx="610" cy="109" rx="16" ry="5" fill="#a0e070" opacity="0.5"/>

  <!-- DB label -->
  <text x="620" y="148" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">wallets</text>

  <!-- Amber sparkles -->
  <g transform="translate(352, 50)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>
  <g transform="translate(545, 185)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b"/>
  </g>

</svg>
