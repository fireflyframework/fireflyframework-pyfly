<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 6 opener: Domain-Driven Design — Sparky beside a Wallet aggregate with Money value object and FundsDeposited event"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── Wallet aggregate box ── -->
  <defs>
    <filter id="ch06-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Wallet container -->
  <rect x="326" y="50" width="210" height="180" rx="14" ry="14"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch06-shadow)"/>
  <!-- Header bar -->
  <rect x="326" y="50" width="210" height="30" rx="14" ry="14" fill="#43b02a"/>
  <rect x="326" y="68" width="210" height="12" fill="#43b02a"/>
  <text x="431" y="65" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="13" font-weight="700">Wallet</text>

  <!-- Fields -->
  <text x="346" y="100" dominant-baseline="middle"
        fill="#23402a" font-size="11" font-family="monospace,monospace">balance: Money</text>
  <text x="346" y="120" dominant-baseline="middle"
        fill="#23402a" font-size="11" font-family="monospace,monospace">owner: OwnerId</text>

  <!-- Separator -->
  <line x1="326" y1="135" x2="536" y2="135" stroke="#b8d9a0" stroke-width="1"/>

  <!-- Money value object chip -->
  <rect x="346" y="145" width="104" height="28" rx="8" ry="8"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.5"/>
  <text x="398" y="159" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="10" font-weight="600">Money «value»</text>

  <!-- Shield icon (invariant) -->
  <!-- Shield path: a rounded-top pentagon -->
  <path d="M490 148 L 510 148 L 518 162 L 500 174 L 482 162 Z"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.8"/>
  <text x="500" y="163" text-anchor="middle" dominant-baseline="middle"
        fill="#2f7d1c" font-size="9" font-weight="700">inv</text>

  <!-- Invariant label -->
  <text x="500" y="200" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">balance ≥ 0</text>

  <!-- Amber event spark: FundsDeposited -->
  <!-- Spark star burst -->
  <g transform="translate(600, 75)">
    <path d="M0,-16 L3.5,-3.5 L16,0 L3.5,3.5 L0,16 L-3.5,3.5 L-16,0 L-3.5,-3.5 Z" fill="#ffc24b"/>
  </g>
  <text x="600" y="102" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="10" font-weight="700">FundsDeposited</text>

  <!-- Arrow from box to event spark -->
  <defs>
    <marker id="ch06-arrow" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffc24b"/>
    </marker>
  </defs>
  <line x1="536" y1="90" x2="580" y2="76"
        stroke="#ffc24b" stroke-width="1.8" stroke-dasharray="4,3"
        marker-end="url(#ch06-arrow)"/>

  <!-- Small amber sparkle bottom-left of scene -->
  <g transform="translate(315, 210)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b"/>
  </g>

</svg>
