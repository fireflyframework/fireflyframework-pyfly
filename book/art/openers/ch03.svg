<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 3 opener: Configuration — layered cards merge into a single Config chip"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left, same drawing as ch01) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── Config layers stacked cards (right side) ── -->
  <defs>
    <marker id="ch03-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
    <filter id="ch03-shadow" x="-8%" y="-8%" width="125%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Stack of 4 layered cards, bottom→top with slight vertical offset for 3D look -->
  <!-- Card 1 (bottom): defaults -->
  <rect x="330" y="198" width="160" height="38" rx="10" ry="10"
        fill="#d8efc6" stroke="#43b02a" stroke-width="1.8"/>
  <text x="410" y="217" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="600">defaults</text>

  <!-- Card 2: pyfly.yaml -->
  <rect x="330" y="158" width="160" height="38" rx="10" ry="10"
        fill="#bfe3a6" stroke="#43b02a" stroke-width="1.8"/>
  <text x="410" y="177" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="600">pyfly.yaml</text>

  <!-- Card 3: profile -->
  <rect x="330" y="118" width="160" height="38" rx="10" ry="10"
        fill="#a7e76a" stroke="#43b02a" stroke-width="1.8"/>
  <text x="410" y="137" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="600">pyfly-{profile}.yaml</text>

  <!-- Card 4 (top): env — amber accent to indicate "wins" -->
  <rect x="330" y="78" width="160" height="38" rx="10" ry="10"
        fill="#fff8ea" stroke="#ffc24b" stroke-width="2.2"/>
  <text x="410" y="97" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="12" font-weight="700">env vars</text>
  <!-- Amber star to indicate "wins" -->
  <g transform="translate(480, 97)">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#ffc24b"/>
  </g>

  <!-- Arrow from stack to Config chip -->
  <line x1="502" y1="141" x2="560" y2="141"
        stroke="#43b02a" stroke-width="3.5"
        marker-end="url(#ch03-arrow)"/>

  <!-- "merges" label on arrow -->
  <text x="531" y="133" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="600">merges</text>

  <!-- Config destination chip -->
  <rect x="562" y="110" width="118" height="62" rx="14" ry="14"
        fill="#43b02a" filter="url(#ch03-shadow)"/>
  <text x="621" y="141" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="20" font-weight="700">Config</text>

  <!-- Extra amber sparkle -->
  <g transform="translate(356, 65)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b" opacity="0.8"/>
  </g>

</svg>
