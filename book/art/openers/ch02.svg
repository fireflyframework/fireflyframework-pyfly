<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 2 opener: Dependency Injection — beans snapping into ApplicationContext"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left, same drawing as ch01) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── ApplicationContext big container (right side) ── -->
  <defs>
    <filter id="ch02-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch02-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- Main container box -->
  <rect x="430" y="55" width="252" height="172" rx="18" ry="18"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch02-shadow)"/>
  <!-- Header bar -->
  <rect x="430" y="55" width="252" height="34" rx="18" ry="18"
        fill="#43b02a"/>
  <!-- Clip the bottom corners of header so only top is rounded -->
  <rect x="430" y="73" width="252" height="16" fill="#43b02a"/>
  <text x="556" y="77" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="14" font-weight="700">ApplicationContext</text>

  <!-- Three bean chips inside the container -->
  <!-- @service chip -->
  <rect x="452" y="102" width="100" height="30" rx="8" ry="8"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.5"/>
  <text x="502" y="117" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="11" font-weight="600">@service</text>

  <!-- @repository chip -->
  <rect x="452" y="145" width="100" height="30" rx="8" ry="8"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.5"/>
  <text x="502" y="160" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="11" font-weight="600">@repository</text>

  <!-- @component chip -->
  <rect x="452" y="188" width="100" height="30" rx="8" ry="8"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.5"/>
  <text x="502" y="203" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="11" font-weight="600">@component</text>

  <!-- Plug dots on right edge of each chip -->
  <circle cx="552" cy="117" r="4" fill="#43b02a"/>
  <circle cx="552" cy="160" r="4" fill="#43b02a"/>
  <circle cx="552" cy="203" r="4" fill="#43b02a"/>

  <!-- Connector lines from plug dots to container right wall -->
  <line x1="556" y1="117" x2="680" y2="117" stroke="#8aa07e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="556" y1="160" x2="680" y2="160" stroke="#8aa07e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="556" y1="203" x2="680" y2="203" stroke="#8aa07e" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Socket circles on container right wall -->
  <circle cx="680" cy="117" r="5" fill="none" stroke="#43b02a" stroke-width="2"/>
  <circle cx="680" cy="160" r="5" fill="none" stroke="#43b02a" stroke-width="2"/>
  <circle cx="680" cy="203" r="5" fill="none" stroke="#43b02a" stroke-width="2"/>

  <!-- Amber sparkles -->
  <g transform="translate(352, 88)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>
  <g transform="translate(395, 195)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b"/>
  </g>
  <g transform="translate(415, 135)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#ffc24b" opacity="0.8"/>
  </g>

</svg>
