<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 8: Domain Events and EDA — EventBus publishes FundsDeposited and fans out to projection, notifier and audit listeners"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="ch08-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch08-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- EventBus horizontal rail — centered left -->
  <rect x="80" y="114" width="196" height="56" rx="14" ry="14"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch08-shadow)"/>
  <!-- Header bar -->
  <rect x="80" y="114" width="196" height="28" rx="14" ry="14" fill="#43b02a"/>
  <rect x="80" y="128" width="196" height="14" fill="#43b02a"/>
  <text x="178" y="128" text-anchor="middle" dominant-baseline="middle"
        fill="#ffffff" font-size="15" font-weight="700">EventBus</text>
  <text x="178" y="156" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11">publish(event)</text>

  <!-- Amber event star above the bus -->
  <g transform="translate(178, 72)">
    <path d="M0,-14 L3.5,-3.5 L14,0 L3.5,3.5 L0,14 L-3.5,3.5 L-14,0 L-3.5,-3.5 Z" fill="#ffc24b"/>
  </g>
  <text x="178" y="96" text-anchor="middle" fill="#23402a" font-size="11" font-weight="600">FundsDeposited</text>

  <!-- Fan-out arrows from bus to listeners -->
  <!-- Arrow to projection (top) -->
  <polyline points="276,128 344,72 402,72"
            fill="none" stroke="#8aa07e" stroke-width="2"
            marker-end="url(#ch08-arrow)"/>
  <!-- Arrow to notifier (middle) -->
  <line x1="276" y1="142" x2="402" y2="142"
        stroke="#8aa07e" stroke-width="2"
        marker-end="url(#ch08-arrow)"/>
  <!-- Arrow to audit (bottom) -->
  <polyline points="276,158 344,212 402,212"
            fill="none" stroke="#8aa07e" stroke-width="2"
            marker-end="url(#ch08-arrow)"/>

  <!-- projection listener -->
  <rect x="404" y="50" width="148" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch08-shadow)"/>
  <rect x="404" y="50" width="148" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="404" y="62" width="148" height="10" fill="#43b02a"/>
  <text x="478" y="61" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">projection</text>
  <text x="478" y="86" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">update view</text>

  <!-- notifier listener -->
  <rect x="404" y="118" width="148" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch08-shadow)"/>
  <rect x="404" y="118" width="148" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="404" y="130" width="148" height="10" fill="#43b02a"/>
  <text x="478" y="129" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">notifier</text>
  <text x="478" y="154" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">send email</text>

  <!-- audit listener -->
  <rect x="404" y="188" width="148" height="48" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2" filter="url(#ch08-shadow)"/>
  <rect x="404" y="188" width="148" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="404" y="200" width="148" height="10" fill="#43b02a"/>
  <text x="478" y="199" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">audit</text>
  <text x="478" y="224" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">log event</text>

  <!-- Amber sparkle top-right -->
  <g transform="translate(660, 52)">
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffc24b" opacity="0.8"/>
  </g>

</svg>
