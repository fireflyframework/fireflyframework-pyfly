<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 15: Observability — Logs, Metrics and Traces pillars feed a Dashboard tile via actuator"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="s15-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="s15-arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- Section label -->
  <text x="360" y="28" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="14" font-weight="700">Observability — Logs · Metrics · Traces</text>

  <!-- Logs panel -->
  <rect x="50" y="68" width="152" height="80" rx="12" ry="12"
        fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#s15-shadow)"/>
  <rect x="50" y="68" width="152" height="30" rx="12" ry="12" fill="#43b02a"/>
  <rect x="50" y="86" width="152" height="12" fill="#43b02a"/>
  <text x="126" y="83" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="13" font-weight="700">Logs</text>
  <!-- log lines -->
  <rect x="68" y="114" width="112" height="6" rx="3" ry="3" fill="#eaf6df"/>
  <rect x="68" y="126" width="82" height="6" rx="3" ry="3" fill="#eaf6df"/>
  <rect x="68" y="138" width="96" height="6" rx="3" ry="3" fill="#eaf6df"/>

  <!-- Metrics panel -->
  <rect x="234" y="68" width="152" height="80" rx="12" ry="12"
        fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#s15-shadow)"/>
  <rect x="234" y="68" width="152" height="30" rx="12" ry="12" fill="#5fd13a"/>
  <rect x="234" y="86" width="152" height="12" fill="#5fd13a"/>
  <text x="310" y="83" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="13" font-weight="700">Metrics</text>
  <!-- mini bar chart -->
  <rect x="252" y="130" width="12" height="16" fill="#43b02a" opacity="0.6"/>
  <rect x="270" y="118" width="12" height="28" fill="#43b02a" opacity="0.8"/>
  <rect x="288" y="124" width="12" height="22" fill="#43b02a"/>
  <rect x="306" y="112" width="12" height="34" fill="#2c8a1c"/>
  <rect x="324" y="120" width="12" height="26" fill="#43b02a" opacity="0.7"/>
  <rect x="342" y="128" width="12" height="18" fill="#43b02a" opacity="0.5"/>

  <!-- Traces panel -->
  <rect x="418" y="68" width="152" height="80" rx="12" ry="12"
        fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#s15-shadow)"/>
  <rect x="418" y="68" width="152" height="30" rx="12" ry="12" fill="#2c8a1c"/>
  <rect x="418" y="86" width="152" height="12" fill="#2c8a1c"/>
  <text x="494" y="83" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="13" font-weight="700">Traces</text>
  <!-- trace spans -->
  <rect x="432" y="108" width="100" height="8" rx="4" ry="4" fill="#43b02a" opacity="0.8"/>
  <rect x="440" y="122" width="72" height="8" rx="4" ry="4" fill="#5fd13a" opacity="0.8"/>
  <rect x="448" y="136" width="48" height="8" rx="4" ry="4" fill="#43b02a" opacity="0.6"/>

  <!-- Arrows → Dashboard -->
  <line x1="126" y1="148" x2="544" y2="196" stroke="#8aa07e" stroke-width="1.8" marker-end="url(#s15-arr)"/>
  <line x1="310" y1="148" x2="556" y2="196" stroke="#8aa07e" stroke-width="1.8" marker-end="url(#s15-arr)"/>
  <line x1="494" y1="148" x2="566" y2="196" stroke="#8aa07e" stroke-width="1.8" marker-end="url(#s15-arr)"/>

  <!-- Dashboard tile -->
  <rect x="514" y="198" width="178" height="64" rx="12" ry="12"
        fill="#fff" stroke="#43b02a" stroke-width="2.5" filter="url(#s15-shadow)"/>
  <rect x="514" y="198" width="178" height="28" rx="12" ry="12" fill="#43b02a"/>
  <rect x="514" y="214" width="178" height="14" fill="#43b02a"/>
  <text x="603" y="212" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="13" font-weight="700">Dashboard</text>
  <text x="603" y="244" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">/admin + actuator</text>

  <!-- Amber sparkle top-right -->
  <g transform="translate(680, 44)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>
