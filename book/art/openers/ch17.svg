<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 17: Integrations — scheduled clock triggers a Job, Notifier fans out to email/SMS/push, inbound webhook dispatches and outbound callback with HMAC retry"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="s17-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2c8a1c" flood-opacity="0.22"/>
    </filter>
    <marker id="s17-arr" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8aa07e"/>
    </marker>
    <marker id="s17-arr-b" markerWidth="10" markerHeight="7"
            refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#8aa07e"/>
    </marker>
  </defs>

  <!-- Section label -->
  <text x="360" y="26" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="13" font-weight="700">Integrations — schedule · notify · webhook</text>

  <!-- Clock / @scheduled — far left -->
  <circle cx="76" cy="108" r="36" fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#s17-shadow)"/>
  <!-- Clock face ticks -->
  <line x1="76" y1="77" x2="76" y2="85" stroke="#43b02a" stroke-width="2"/>
  <line x1="76" y1="131" x2="76" y2="139" stroke="#43b02a" stroke-width="2"/>
  <line x1="45" y1="108" x2="53" y2="108" stroke="#43b02a" stroke-width="2"/>
  <line x1="99" y1="108" x2="107" y2="108" stroke="#43b02a" stroke-width="2"/>
  <!-- Clock hands -->
  <line x1="76" y1="108" x2="76" y2="90" stroke="#2c8a1c" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="108" x2="91" y2="108" stroke="#2c8a1c" stroke-width="2.5" stroke-linecap="round"/>
  <text x="76" y="160" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="700">@scheduled</text>

  <!-- Arrow clock → Job -->
  <line x1="112" y1="108" x2="146" y2="108"
        stroke="#8aa07e" stroke-width="2" marker-end="url(#s17-arr)"/>

  <!-- Job box -->
  <rect x="148" y="82" width="94" height="52" rx="10" ry="10"
        fill="#fff" stroke="#43b02a" stroke-width="2" filter="url(#s17-shadow)"/>
  <rect x="148" y="82" width="94" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="148" y="94" width="94" height="10" fill="#43b02a"/>
  <text x="195" y="93" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Job</text>
  <text x="195" y="118" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">runs task</text>

  <!-- Notifier (envelope) — below clock -->
  <rect x="42" y="186" width="52" height="38" rx="5" ry="5"
        fill="#fff" stroke="#43b02a" stroke-width="2"/>
  <polyline points="42,186 68,208 94,186" fill="none" stroke="#43b02a" stroke-width="1.8"/>
  <text x="68" y="242" text-anchor="middle"
        fill="#43b02a" font-size="10" font-weight="700">Notifier</text>

  <!-- Notifier arrows to channel chips -->
  <line x1="94" y1="196" x2="124" y2="190"
        stroke="#8aa07e" stroke-width="1.5" marker-end="url(#s17-arr)"/>
  <line x1="94" y1="205" x2="124" y2="205"
        stroke="#8aa07e" stroke-width="1.5" marker-end="url(#s17-arr)"/>
  <line x1="94" y1="214" x2="124" y2="220"
        stroke="#8aa07e" stroke-width="1.5" marker-end="url(#s17-arr)"/>

  <!-- Channel chips -->
  <rect x="126" y="181" width="52" height="18" rx="7" ry="7"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.2"/>
  <text x="152" y="190" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="600">email</text>
  <rect x="126" y="196" width="52" height="18" rx="7" ry="7"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.2"/>
  <text x="152" y="205" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="600">SMS</text>
  <rect x="126" y="211" width="52" height="18" rx="7" ry="7"
        fill="#eaf6df" stroke="#43b02a" stroke-width="1.2"/>
  <text x="152" y="220" text-anchor="middle" dominant-baseline="middle"
        fill="#23402a" font-size="9.5" font-weight="600">push</text>

  <!-- Webhook inbound box — right side top -->
  <rect x="408" y="72" width="140" height="58" rx="10" ry="10"
        fill="#fff" stroke="#5fd13a" stroke-width="2" filter="url(#s17-shadow)"/>
  <rect x="408" y="72" width="140" height="24" rx="10" ry="10" fill="#5fd13a"/>
  <rect x="408" y="86" width="140" height="10" fill="#5fd13a"/>
  <text x="478" y="84" text-anchor="middle" dominant-baseline="middle"
        fill="#16331a" font-size="12" font-weight="700">Webhook ↓</text>
  <text x="478" y="116" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">verify → dispatch</text>

  <!-- Callback outbound box — right side bottom -->
  <rect x="408" y="162" width="140" height="58" rx="10" ry="10"
        fill="#fff" stroke="#2c8a1c" stroke-width="2" filter="url(#s17-shadow)"/>
  <rect x="408" y="162" width="140" height="24" rx="10" ry="10" fill="#2c8a1c"/>
  <rect x="408" y="176" width="140" height="10" fill="#2c8a1c"/>
  <text x="478" y="174" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Callback ↑</text>
  <text x="478" y="206" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="10">HMAC → retry</text>

  <!-- Two-way arrows between webhook boxes -->
  <line x1="548" y1="130" x2="582" y2="162"
        stroke="#8aa07e" stroke-width="1.8" stroke-dasharray="6,4"
        marker-end="url(#s17-arr)"/>
  <line x1="578" y1="162" x2="544" y2="130"
        stroke="#8aa07e" stroke-width="1.8" stroke-dasharray="6,4"
        marker-end="url(#s17-arr-b)"/>

  <!-- External party box -->
  <rect x="588" y="132" width="94" height="44" rx="10" ry="10"
        fill="#eaf6df" stroke="#8aa07e" stroke-width="1.8"/>
  <text x="635" y="154" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11" font-weight="600">3rd party</text>

  <!-- Amber sparkle top-right -->
  <g transform="translate(682, 44)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>
