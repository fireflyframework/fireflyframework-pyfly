<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 11 opener: HTTP clients — Sparky beside a Wallet service and Payments service joined by an arrow with a client chip on the wire (a typed call across the network)"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <!-- ── Sparky (left) ── -->
  <ellipse cx="160" cy="242" rx="52" ry="10" fill="#b8d9a0" opacity="0.6"/>

  <path d="M170 230 C 90 220 95 160 130 148 C 165 136 168 100 148 78"
        fill="none" stroke="#5fd13a" stroke-width="22" stroke-linecap="round"/>
  <path d="M168 232 C 185 238 200 228 190 218"
        fill="none" stroke="#5fd13a" stroke-width="14" stroke-linecap="round"/>

  <!-- Head -->
  <ellipse cx="148" cy="68" rx="28" ry="24" fill="#67d642" stroke="#2f7d1c" stroke-width="3"/>
  <circle cx="138" cy="62" r="5.5" fill="#fff"/>
  <circle cx="158" cy="62" r="5.5" fill="#fff"/>
  <circle cx="139.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="159.5" cy="61" r="2.6" fill="#16331a"/>
  <circle cx="140.5" cy="59.5" r="1" fill="#fff"/>
  <circle cx="160.5" cy="59.5" r="1" fill="#fff"/>
  <path d="M140 76 Q 148 83 156 76" stroke="#1c5512" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148 80 L 148 86 M 145 86 L 148 86 L 151 86"
        stroke="#e8334a" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Divider -->
  <line x1="300" y1="30" x2="300" y2="250" stroke="#b8d9a0" stroke-width="1.5" stroke-dasharray="6,6"/>

  <!-- ── HTTP client diagram ── -->
  <defs>
    <filter id="ch11-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch11-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- Wallet service box (left) -->
  <rect x="318" y="110" width="100" height="52" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch11-shadow)"/>
  <rect x="318" y="110" width="100" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="318" y="122" width="100" height="10" fill="#43b02a"/>
  <text x="368" y="121" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Wallet</text>
  <text x="368" y="148" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">service</text>

  <!-- Arrow: Wallet → Payments with client chip -->
  <line x1="418" y1="136" x2="596" y2="136"
        stroke="#43b02a" stroke-width="2"
        marker-end="url(#ch11-arrow)"/>

  <!-- client chip on the wire -->
  <rect x="469" y="122" width="72" height="22" rx="11" ry="11"
        fill="#ffffff" stroke="#43b02a" stroke-width="2"/>
  <text x="505" y="133" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="9.5" font-weight="700">@service_client</text>

  <!-- Wire label above chip -->
  <text x="505" y="113" text-anchor="middle"
        fill="#6a7a64" font-size="9" font-style="italic">HTTP</text>

  <!-- Payments service box (right) -->
  <rect x="598" y="110" width="100" height="52" rx="10" ry="10"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch11-shadow)"/>
  <rect x="598" y="110" width="100" height="22" rx="10" ry="10" fill="#43b02a"/>
  <rect x="598" y="122" width="100" height="10" fill="#43b02a"/>
  <text x="648" y="121" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="12" font-weight="700">Payments</text>
  <text x="648" y="148" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="9">service</text>

  <!-- Amber sparkle -->
  <g transform="translate(648, 90)">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z" fill="#ffc24b"/>
  </g>

</svg>
