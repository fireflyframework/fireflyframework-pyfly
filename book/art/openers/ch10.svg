<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280"
     role="img" aria-label="Chapter 10: Messaging — Wallet service publishes to a wallet-events broker topic, Payments service consumes it"
     font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="720" height="280" fill="#eaf6df"/>

  <defs>
    <filter id="ch10-shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2c8a1c" flood-opacity="0.25"/>
    </filter>
    <marker id="ch10-arrow" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#43b02a"/>
    </marker>
  </defs>

  <!-- Wallet service box (left) -->
  <rect x="58" y="102" width="150" height="68" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch10-shadow)"/>
  <rect x="58" y="102" width="150" height="30" rx="12" ry="12" fill="#43b02a"/>
  <rect x="58" y="118" width="150" height="14" fill="#43b02a"/>
  <text x="133" y="117" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="14" font-weight="700">Wallet</text>
  <text x="133" y="153" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11">publish event</text>

  <!-- Arrow: Wallet → topic -->
  <line x1="209" y1="136" x2="270" y2="136"
        stroke="#43b02a" stroke-width="2.5"
        marker-end="url(#ch10-arrow)"/>

  <!-- Envelope icon on arrow -->
  <rect x="224" y="122" width="22" height="16" rx="2" ry="2"
        fill="#fff" stroke="#43b02a" stroke-width="1.8"/>
  <polyline points="224,122 235,132 246,122"
            fill="none" stroke="#43b02a" stroke-width="1.4"/>

  <!-- Broker topic pill (center) -->
  <rect x="272" y="110" width="176" height="52" rx="26" ry="26"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch10-shadow)"/>
  <text x="360" y="136" text-anchor="middle" dominant-baseline="middle"
        fill="#43b02a" font-size="13" font-weight="700">wallet-events</text>

  <!-- Arrow: topic → Payments -->
  <line x1="449" y1="136" x2="510" y2="136"
        stroke="#43b02a" stroke-width="2.5"
        marker-end="url(#ch10-arrow)"/>

  <!-- Payments service box (right) -->
  <rect x="512" y="102" width="150" height="68" rx="12" ry="12"
        fill="#ffffff" stroke="#43b02a" stroke-width="2.5" filter="url(#ch10-shadow)"/>
  <rect x="512" y="102" width="150" height="30" rx="12" ry="12" fill="#43b02a"/>
  <rect x="512" y="118" width="150" height="14" fill="#43b02a"/>
  <text x="587" y="117" text-anchor="middle" dominant-baseline="middle"
        fill="#fff" font-size="14" font-weight="700">Payments</text>
  <text x="587" y="153" text-anchor="middle" dominant-baseline="middle"
        fill="#6a7a64" font-size="11">consume</text>

  <!-- Amber star burst (event emphasis) -->
  <g transform="translate(360, 78)">
    <path d="M0,-11 L2.6,-2.6 L11,0 L2.6,2.6 L0,11 L-2.6,2.6 L-11,0 L-2.6,-2.6 Z" fill="#ffc24b"/>
  </g>

  <!-- "broker" label under pill -->
  <text x="360" y="178" text-anchor="middle"
        fill="#43b02a" font-size="11" font-weight="600">broker topic</text>

  <!-- Amber sparkle corners -->
  <g transform="translate(58, 246)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#ffc24b" opacity="0.7"/>
  </g>
  <g transform="translate(672, 56)">
    <path d="M0,-7 L1.8,-1.8 L7,0 L1.8,1.8 L0,7 L-1.8,1.8 L-7,0 L-1.8,-1.8 Z" fill="#ffc24b" opacity="0.8"/>
  </g>

</svg>
