<svg xmlns="http://www.w3.org/2000/svg" width="908" height="500" viewBox="0 0 908 500" role="img" aria-label="PyFly distributed transactions: a saga DAG with reverse-order compensation, plus Saga, Workflow and TCC summary cards." font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
