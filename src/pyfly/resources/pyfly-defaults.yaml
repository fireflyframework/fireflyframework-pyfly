pyfly:
  app:
    name: "pyfly-app"
    version: "0.1.0"
    description: ""
  profiles:
    active: ""
  banner:
    mode: "TEXT"
    location: ""
  logging:
    level:
      root: "INFO"
    format: "console"
  web:
    # NOTE: the application listen host/port moved to pyfly.server.host / .port
    # (Spring server.address / server.port parity). pyfly.web.host / .port were
    # removed in v26.06.102.
    debug: false
    docs:
      enabled: true
    # Global JSON (de)serialization config — the ObjectMapper-equivalent.
    # Per-model behavior stays with Pydantic; these are app-wide toggles.
    json:
      property-naming-strategy: as-is   # as-is | camelCase (camelCase implies by-alias on output)
      by-alias: false
      exclude-none: false
      exclude-defaults: false
      fail-on-unknown-properties: false
    # RFC 7807 application/problem+json error responses (opt-in; Spring Boot 3 parity).
    problem-details:
      enabled: false
    actuator:
      # Legacy alias retained for back-compat; see pyfly.management.* below.
      enabled: true
  # Spring Boot-style actuator/observability configuration, pyfly-namespaced.
  management:
    enabled: true
    endpoints:
      web:
        base-path: "/actuator"
        exposure:
          # Spring Boot secure default: only health + info exposed over HTTP.
          # Set to "*" (or a CSV list) to expose more, e.g. "health,info,metrics,prometheus,env".
          include: "health,info"
          exclude: ""
    endpoint:
      health:
        show-details: "when-authorized"   # never | when-authorized | always
        show-components: "when-authorized"
      shutdown:
        enabled: false
    metrics:
      distribution:
        percentiles-histogram:
          http.server.requests: false
    # Spring management.server.* parity. By DEFAULT the actuator endpoints and the
    # admin dashboard run on this dedicated port (9090) while the app stays on
    # pyfly.server.port (8080). Set this equal to the app port for single-port
    # behavior; -1 disables the management web endpoints entirely.
    server:
      port: 9090
      address: null
      base-path: ""
  server:
    # Application listener (Spring server.address / server.port parity).
    host: "0.0.0.0"
    port: 8080
    type: "auto"
    event-loop: "auto"
    workers: 0
    backlog: 1024
    graceful-timeout: 30
    http: "auto"
    keep-alive-timeout: 5
    granian:
      runtime-threads: 1
      runtime-mode: "auto"
      respawn-failed-workers: true
    # Server-layer observability (worker/connection/uptime metrics + lifecycle).
    # Emits server_* meters into the Prometheus registry, exposed at
    # /actuator/prometheus and the admin Observability view. Enabled by the
    # web/core starters; needs the observability extra (prometheus_client).
    observability:
      enabled: true
      sample-interval-seconds: 5.0
      access-log: false
  data:
    enabled: false
    url: "sqlite+aiosqlite:///pyfly.db"
    echo: false
    pool-size: 5
    relational:
      ddl-auto: "create"
  cache:
    enabled: false
    provider: "memory"
    ttl: 300
  messaging:
    provider: "memory"
  client:
    timeout: 30
    retry:
      max-attempts: 3
      base-delay: 1.0
    circuit-breaker:
      failure-threshold: 5
      recovery-timeout: 30
  admin:
    enabled: true
    path: "/admin"
    title: "PyFly Admin"
    theme: "auto"
    require-auth: false
    refresh-interval: 5000
  security:
    enabled: false
    jwt:
      secret: "change-me-in-production"
      algorithm: "HS256"
    password:
      bcrypt-rounds: 12
  observability:
    metrics:
      enabled: true
    tracing:
      enabled: true
      service-name: "${pyfly.app.name}"
  transactional:
    enabled: false
    saga:
      compensation_policy: STRICT_SEQUENTIAL
      default_timeout_ms: 300000
      max_concurrent_sagas: 100
      layer_concurrency: 0
      persistence_enabled: true
      metrics_enabled: true
      recovery_enabled: true
      recovery_interval_seconds: 60
      stale_threshold_seconds: 600
      cleanup_older_than_hours: 24
    tcc:
      default_timeout_ms: 30000
      retry_enabled: true
      max_retries: 3
      backoff_ms: 1000
      persistence_enabled: true
      metrics_enabled: true
    backpressure:
      strategy: adaptive
      concurrency: 10
      batch_size: 5
      failure_threshold: 50
      success_threshold: 2
      wait_duration_ms: 60000
