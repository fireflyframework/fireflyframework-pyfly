name: Deploy GitHub Pages

# Builds the landing page (web/) + docs (MkDocs Material) into _site/ and
# deploys to GitHub Pages. Requires repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "docs/**"
      - "assets/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "scripts/build_site.py"
      - "requirements-docs.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs toolchain
        run: pip install -r requirements-docs.txt

      - name: Build site (landing + docs)
        run: python scripts/build_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
